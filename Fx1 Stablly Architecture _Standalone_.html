  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

olor:#fff;font-size:10px;font-weight:800;letter-spacing:2px;padding:3px 9px;border-radius:4px;}\n.sb{background:linear-gradient(90deg,#0891B2,#1A56DB);color:#fff;font-size:9px;font-weight:800;letter-spacing:1.5px;padding:3px 11px;border-radius:20px;}\n.csep{width:1px;height:16px;background:#1E3A5F;}\n.ct{color:#93C5FD;font-size:12px;font-weight:700;}\n.cr-note{font-size:10px;color:#475569;font-weight:600;background:#0A1628;border:1px solid #1E3A5F;border-radius:20px;padding:3px 12px;}\n\n/* LAYOUT */\n.main{display:flex;height:calc(100vh - 48px);overflow:hidden;}\n\n/* LEFT DIAGRAM */\n.arch{width:420px;flex-shrink:0;padding:16px 20px;display:flex;flex-direction:column;border-right:1px solid #1E2D4E;overflow-y:auto;background:#080F1E;}\n.arch::-webkit-scrollbar{width:3px;}\n.arch::-webkit-scrollbar-thumb{background:#1E2D4E;border-radius:2px;}\n\n.ext-sources{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}\n.ext-node{background:#0A1628;border:1px solid #1E2D4E;border-radius:6px;padding:4px 9px;font-size:9.5px;color:#475569;font-weight:600;display:flex;align-items:center;gap:4px;}\n.ext-node.active{border-color:#1A56DB;color:#60A5FA;}\n\n.layer-card{border-radius:11px;border:2px solid;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}\n.layer-card:hover{transform:translateX(3px);}\n.layer-card.selected{transform:translateX(5px);}\n.lc-inner{padding:12px 14px;}\n.lc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}\n.lc-badge{display:flex;align-items:center;gap:7px;}\n.lc-num{font-size:11px;font-weight:800;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.lc-name{font-size:12px;font-weight:800;color:#F1F5F9;}\n.lc-kpi{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;}\n.lc-desc{font-size:10.5px;color:#64748B;line-height:1.5;margin-bottom:6px;}\n.lc-tags{display:flex;gap:4px;flex-wrap:wrap;}\n.lc-tag{font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:4px;background:#0A1628;color:#475569;border:1px solid #1E2D4E;}\n\n.connector{display:flex;align-items:center;justify-content:center;height:24px;position:relative;}\n.conn-line{width:2px;height:100%;position:absolute;left:50%;transform:translateX(-50%);}\n.conn-dot{width:8px;height:8px;border-radius:50%;position:absolute;animation:flowDown 2s infinite;left:50%;transform:translateX(-50%);}\n@keyframes flowDown{0%{opacity:0;top:0;}40%{opacity:1;}100%{opacity:0;top:100%;}}\n.conn-label{font-size:8.5px;font-weight:700;padding:1px 8px;border-radius:10px;position:absolute;right:14px;white-space:nowrap;}\n.ei-node{background:#0C1B3E;border:1px solid #1E3A5F;border-radius:5px;padding:3px 7px;font-size:8.5px;color:#4B6A85;font-weight:600;white-space:nowrap;position:absolute;left:0;}\n\n.stakeholders{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}\n.sh-node{border-radius:7px;padding:5px 10px;font-size:9px;font-weight:700;display:flex;align-items:center;gap:5px;}\n\n/* RIGHT DETAIL */\n.detail{flex:1;display:flex;flex-direction:column;overflow:hidden;}\n\n/* INTRO */\n.intro{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 40px;}\n.intro-icon{font-size:44px;margin-bottom:16px;}\n.intro-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#F1F5F9;margin-bottom:8px;}\n.intro-sub{font-size:13px;color:#475569;max-width:440px;line-height:1.7;margin-bottom:24px;}\n.intro-chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;}\n.ic{border:1px solid;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;}\n.ic-arrow{font-size:16px;color:#1E2D4E;}\n\n/* DETAIL SCROLL */\n.det-scroll{flex:1;overflow-y:auto;padding:24px 32px;}\n.det-scroll::-webkit-scrollbar{width:4px;}\n.det-scroll::-webkit-scrollbar-thumb{background:#1E2D4E;border-radius:2px;}\n\n/* LAYER HEADER */\n.det-header{display:flex;align-items:flex-start;gap:0;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #1E2D4E;}\n.det-num-big{font-family:'Playfair Display',serif;font-size:56px;font-weight:800;line-height:1;margin-right:16px;flex-shrink:0;opacity:.2;}\n.det-right{}\n.det-kicker{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}\n.det-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:#F1F5F9;margin-bottom:6px;}\n.det-headline{font-size:13px;font-style:italic;line-height:1.6;margin-bottom:12px;}\n.outcome-pills{display:flex;gap:8px;flex-wrap:wrap;}\n.op{border-radius:8px;padding:8px 14px;text-align:center;border:1px solid;}\n.op-val{font-size:17px;font-weight:800;line-height:1;}\n.op-key{font-size:9px;font-weight:600;color:#64748B;letter-spacing:.5px;margin-top:2px;}\n\n/* CONTENT SECTIONS */\n.cs{margin-bottom:20px;}\n.cs-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:10px;}\n.cs-label-bar{width:20px;height:2px;border-radius:1px;}\n.cs-body{font-size:13px;color:#CBD5E1;line-height:1.85;}\n.cs-body p{margin-bottom:10px;}\n.cs-body p:last-child{margin-bottom:0;}\n.cs-body strong{color:#F1F5F9;font-weight:700;}\n.cs-body em{font-style:normal;font-weight:600;}\n\n/* FIX ITEMS */\n.fix-grid{display:flex;flex-direction:column;gap:8px;margin-top:4px;}\n.fix-item{background:#0A1628;border-radius:9px;padding:11px 14px;border-left:3px solid;display:flex;gap:10px;align-items:flex-start;}\n.fix-icon{font-size:14px;flex-shrink:0;margin-top:2px;}\n.fix-text{font-size:12.5px;color:#CBD5E1;line-height:1.6;}\n.fix-text strong{color:#F1F5F9;}\n\n/* OUTCOME CARD */\n.outcome-card{border-radius:12px;padding:18px 20px;border-left:4px solid;margin-top:4px;}\n.oc-body{font-size:13px;line-height:1.8;}\n.oc-body p{margin-bottom:8px;}\n.oc-body p:last-child{margin-bottom:0;}\n.oc-body strong{font-weight:700;}\n\n/* QUOTE BLOCK */\n.quote-block{border-radius:0 10px 10px 0;border-left:4px solid;padding:12px 16px;margin:14px 0;font-size:13px;font-style:italic;line-height:1.7;}\n\n/* ═══════════════════════════════════════════\n   S1 VISUAL MODE\n   ═══════════════════════════════════════════ */\n.s1v{display:flex;flex-direction:column;gap:22px;padding-bottom:32px;}\n\n/* Header */\n.s1v-header{display:flex;gap:16px;padding-bottom:18px;border-bottom:1px solid #1E2D4E;}\n.s1v-num{font-family:'Playfair Display',serif;font-size:60px;font-weight:800;color:#94A3B8;opacity:.22;line-height:.85;letter-spacing:-2px;flex-shrink:0;}\n.s1v-head-r{flex:1;min-width:0;}\n.s1v-kicker{font-size:9px;font-weight:700;letter-spacing:2.2px;text-transform:uppercase;color:#94A3B8;margin-bottom:6px;}\n.s1v-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;color:#F1F5F9;margin-bottom:8px;line-height:1.05;}\n.s1v-headline{font-size:13px;font-style:italic;color:#94A3B8;line-height:1.5;margin-bottom:14px;}\n.s1v-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}\n.s1v-stat{background:#0A1628;border:1px solid #64748B40;border-radius:9px;padding:9px 12px;position:relative;overflow:hidden;}\n.s1v-stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#94A3B8;}\n.s1v-stat.gain::before{background:#4ADE80;}\n.s1v-stat-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;line-height:1;color:#F1F5F9;}\n.s1v-stat.gain .s1v-stat-val{color:#4ADE80;}\n.s1v-stat-key{font-size:8.5px;color:#64748B;letter-spacing:.5px;margin-top:3px;font-weight:600;}\n\n/* Section header */\n.s1v-sec{display:flex;flex-direction:column;gap:12px;}\n.s1v-sec-hd{display:flex;align-items:center;gap:10px;}\n.s1v-sec-num{font-family:'Playfair Display',serif;font-size:13px;font-weight:800;color:#334155;letter-spacing:1px;font-style:italic;}\n.s1v-sec-title{font-size:10px;font-weight:800;letter-spacing:2.2px;text-transform:uppercase;}\n.s1v-sec-bar{flex:1;height:1px;background:linear-gradient(90deg,#1E2D4E 0%,transparent 100%);}\n.s1v-sec-meta{font-size:9px;color:#475569;font-weight:600;letter-spacing:.5px;}\n\n/* ── SECTION CARDS (Option B) ── */\n.s1v-sec-card{border-radius:14px;padding:22px 24px 24px;position:relative;}\n.s1v-sec-card.red{background:linear-gradient(135deg,#2D101A 0%,#1B0A10 100%);border:1px solid #DC262650;box-shadow:inset 0 0 100px rgba(220,38,38,.10),0 4px 24px rgba(220,38,38,.06);}\n.s1v-sec-card.cyan{background:linear-gradient(135deg,#082A38 0%,#0A1C28 100%);border:1px solid #22D3EE50;box-shadow:inset 0 0 100px rgba(34,211,238,.10),0 4px 24px rgba(34,211,238,.06);}\n.s1v-sec-card.green{background:linear-gradient(135deg,#0D2C1D 0%,#0E1C12 100%);border:1px solid #4ADE8050;box-shadow:inset 0 0 100px rgba(74,222,128,.10),0 4px 24px rgba(74,222,128,.06);}\n\n/* card corner accent — brighter */\n.s1v-sec-card::after{content:'';position:absolute;top:0;right:0;width:120px;height:120px;border-radius:0 14px 0 60%;opacity:.8;pointer-events:none;}\n.s1v-sec-card.red::after{background:radial-gradient(circle at top right,#DC262630,transparent 70%);}\n.s1v-sec-card.cyan::after{background:radial-gradient(circle at top right,#22D3EE30,transparent 70%);}\n.s1v-sec-card.green::after{background:radial-gradient(circle at top right,#4ADE8030,transparent 70%);}\n\n.s1v-sec-hd2{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;position:relative;z-index:1;}\n.s1v-sec-badge{width:54px;height:54px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:24px;font-weight:800;flex-shrink:0;line-height:1;letter-spacing:-1px;color:#fff;}\n.s1v-sec-card.red .s1v-sec-badge{background:linear-gradient(135deg,#7F1D1D 0%,#DC2626 100%);border:1px solid #DC2626;box-shadow:0 4px 20px #DC262650,inset 0 1px 0 rgba(255,255,255,.15);}\n.s1v-sec-card.cyan .s1v-sec-badge{background:linear-gradient(135deg,#0E7490 0%,#22D3EE 100%);border:1px solid #22D3EE;box-shadow:0 4px 20px #22D3EE50,inset 0 1px 0 rgba(255,255,255,.2);}\n.s1v-sec-card.green .s1v-sec-badge{background:linear-gradient(135deg,#166534 0%,#4ADE80 100%);border:1px solid #4ADE80;box-shadow:0 4px 20px #4ADE8050,inset 0 1px 0 rgba(255,255,255,.2);}\n\n.s1v-sec-titles{flex:1;min-width:0;padding-top:4px;}\n.s1v-sec-title2{font-size:19px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;line-height:1;margin-bottom:6px;font-family:'DM Sans',sans-serif;}\n.s1v-sec-card.red .s1v-sec-title2{color:#FCA5A5;}\n.s1v-sec-card.cyan .s1v-sec-title2{color:#67E8F9;}\n.s1v-sec-card.green .s1v-sec-title2{color:#86EFAC;}\n.s1v-sec-sub2{font-size:13.5px;font-weight:500;color:#CBD5E1;line-height:1.45;}\n.s1v-sec-sub2 b{font-weight:700;color:#F1F5F9;}\n.s1v-sec-meta2{font-size:9.5px;color:#475569;font-weight:600;letter-spacing:.5px;margin-top:6px;text-transform:uppercase;}\n\n/* actions slot (for view switcher in section 02) */\n.s1v-sec-actions{flex-shrink:0;align-self:flex-start;padding-top:8px;}\n\n/* ── LEAK MAP ── */\n.leak-map{display:flex;flex-direction:column;gap:5px;}\n.leak-row{display:grid;grid-template-columns:140px 1fr 70px;gap:14px;align-items:center;background:#0A1628;border:1px solid #1E2D4E;border-radius:9px;padding:9px 14px;transition:all .25s ease;cursor:help;position:relative;}\n.leak-row:hover{border-color:#DC2626;background:#170B12;}\n.leak-row:hover .lr-pct{transform:scale(1.08);}\n.leak-row:hover .lr-bar-leak{background:repeating-linear-gradient(135deg,#DC2626,#DC2626 5px,#7F1D1D 5px,#7F1D1D 10px);}\n.lr-channel{display:flex;align-items:center;gap:10px;min-width:0;}\n.lr-logo{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;color:#fff;letter-spacing:-.5px;}\n.lr-meta{background:#1877F2;}\n.lr-google{background:#fff;color:#1F2937;}\n.lr-tiktok{background:#000;color:#FE2C55;}\n.lr-linkedin{background:#0A66C2;}\n.lr-landing{background:#374151;}\n.lr-mt4{background:#10B981;}\n.lr-name{font-size:11.5px;font-weight:700;color:#CBD5E1;line-height:1.15;}\n.lr-sub{font-size:8.5px;color:#475569;font-weight:600;margin-top:2px;letter-spacing:.3px;}\n.lr-bar{position:relative;height:10px;background:#0F172A;border-radius:5px;overflow:hidden;border:1px solid #1E2D4E;}\n.lr-bar-cap{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#475569,#334155);}\n.lr-bar-leak{position:absolute;right:0;top:0;height:100%;background:repeating-linear-gradient(135deg,#DC262670,#DC262670 4px,#7F1D1D60 4px,#7F1D1D60 8px);transition:background .25s;}\n.lr-pct-block{text-align:right;transition:transform .2s;}\n.lr-pct{font-size:14px;font-weight:800;color:#EF4444;line-height:1;transition:transform .25s;font-family:'Playfair Display',serif;}\n.lr-pct-sub{font-size:7.5px;color:#7F1D1D;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-top:3px;}\n\n/* Tooltip */\n.tip{position:absolute;left:50%;bottom:calc(100% + 10px);transform:translateX(-50%);width:280px;background:#0F172A;border:1px solid;border-radius:8px;padding:10px 12px;font-size:10.5px;color:#CBD5E1;line-height:1.55;opacity:0;pointer-events:none;transition:opacity .2s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.6);text-align:left;}\n.tip::after{content:'';position:absolute;left:50%;top:100%;transform:translateX(-50%);border:6px solid transparent;}\n.tip.red{border-color:#DC2626;}\n.tip.red::after{border-top-color:#DC2626;}\n.tip.cyan{border-color:#22D3EE;}\n.tip.cyan::after{border-top-color:#22D3EE;}\n.tip b{font-weight:700;}\n.tip.red b{color:#FCA5A5;}\n.tip.cyan b{color:#67E8F9;}\n.leak-row:hover .tip{opacity:1;}\n.fs-card:hover > .tip,.plat-card:hover > .tip,.mx-cell:not(.empty):hover > .tip,.tl-milestone:hover > .tip,.tier-card:hover > .tip,.clock-legend-row:hover > .tip,.icp-node:hover > .tip{opacity:1;}\n\n/* Disconnect bus */\n.leak-bus{margin-top:8px;background:#0F172A;border:1px dashed #475569;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;}\n.leak-bus-icon{width:26px;height:26px;border-radius:6px;background:#1F2937;color:#94A3B8;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}\n.leak-bus-text{flex:1;font-size:11px;color:#94A3B8;line-height:1.4;}\n.leak-bus-text b{color:#CBD5E1;font-weight:700;}\n.leak-bus-tag{font-size:8.5px;color:#DC2626;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;border:1px solid #DC2626;border-radius:4px;flex-shrink:0;}\n\n/* ════ VIEW SWITCHER ════ */\n.view-switcher-wrap{display:flex;align-items:center;justify-content:space-between;}\n.view-switcher{display:inline-flex;gap:2px;padding:3px;background:#0A1628;border:1px solid #1E2D4E;border-radius:8px;}\n.vs-btn{background:transparent;border:none;padding:6px 12px;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#64748B;cursor:pointer;border-radius:5px;transition:all .15s;font-family:inherit;}\n.vs-btn:hover{color:#CBD5E1;}\n.vs-btn.active{background:#1A56DB;color:#fff;}\n\n/* ════ ARCH: PIPELINE ════ */\n.arch-frame{background:linear-gradient(180deg,#080F1E 0%,#0A1628 100%);border:1px solid #1E2D4E;border-radius:14px;padding:22px 18px;position:relative;}\n.arch-frame::before{content:attr(data-label);position:absolute;top:-9px;left:18px;background:#060D18;padding:0 8px;font-size:9px;font-weight:800;letter-spacing:2.5px;color:#475569;}\n.arch-frame::after{content:attr(data-meta);position:absolute;top:-9px;right:18px;background:#060D18;padding:0 8px;font-size:9px;font-weight:600;color:#334155;letter-spacing:.5px;}\n\n.pv-sources{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;}\n.pv-src{position:relative;background:#0A1628;border:1px solid #1E3A5F;border-radius:9px;padding:9px 4px 9px;text-align:center;transition:all .2s;cursor:help;}\n.pv-src:hover{border-color:#22D3EE;background:#081F28;transform:translateY(-3px);box-shadow:0 10px 24px #22D3EE25;}\n.pv-src-logo{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin:0 auto 6px;color:#fff;letter-spacing:-.5px;}\n.pv-src-name{font-size:9.5px;font-weight:700;color:#CBD5E1;margin-bottom:2px;line-height:1.15;}\n.pv-src-api{font-size:7.5px;color:#64748B;font-weight:600;letter-spacing:.3px;}\n.pv-src-stat{font-size:9.5px;font-weight:800;color:#22D3EE;margin-top:5px;padding-top:5px;border-top:1px solid #1E3A5F;font-family:'DM Mono',monospace;}\n.pv-src .tip{top:calc(100% + 10px);bottom:auto;width:240px;}\n.pv-src .tip::after{top:auto;bottom:100%;border-top-color:transparent !important;border-bottom-color:#22D3EE;}\n.pv-src:hover .tip{opacity:1;}\n\n/* funnel from sources to SSL */\n.pv-funnel{position:relative;height:32px;margin:2px 0;}\n.pv-funnel svg{position:absolute;inset:0;width:100%;height:100%;}\n.pv-funnel-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:#22D3EE;box-shadow:0 0 12px #22D3EE;left:50%;transform:translateX(-50%);animation:flowDownPv 1.6s infinite;}\n@keyframes flowDownPv{0%{top:0;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{top:32px;opacity:0;}}\n\n/* Server-side layer */\n.pv-ssl{background:linear-gradient(90deg,#0891B215,#1A56DB22,#0891B215);border:1px solid #1A56DB;border-radius:9px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:14px;}\n.pv-ssl-l{display:flex;align-items:center;gap:11px;}\n.pv-ssl-icon{width:30px;height:30px;border-radius:7px;background:#1A56DB;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;}\n.pv-ssl-title{font-size:11.5px;font-weight:800;color:#60A5FA;letter-spacing:.5px;line-height:1.1;}\n.pv-ssl-sub{font-size:8.5px;color:#475569;margin-top:2px;letter-spacing:.3px;}\n.pv-ssl-r{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}\n.pv-ssl-chip{font-size:8.5px;font-weight:700;background:#0A1628;color:#93C5FD;border:1px solid #1A56DB60;border-radius:4px;padding:3px 7px;font-family:'DM Mono',monospace;}\n\n/* trunk to BQ */\n.pv-trunk{height:26px;position:relative;display:flex;justify-content:center;align-items:center;}\n.pv-trunk-line{width:2px;height:100%;background:linear-gradient(#1A56DB,#D97706);}\n.pv-trunk-dot{position:absolute;left:50%;width:7px;height:7px;border-radius:50%;background:#FCD34D;transform:translateX(-50%);box-shadow:0 0 14px #FCD34D;animation:flowDownTrunk 1.7s infinite;}\n@keyframes flowDownTrunk{0%{top:0;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{top:100%;opacity:0;}}\n\n/* BigQuery hub */\n.pv-bq{background:linear-gradient(135deg,#1C1208 0%,#221408 100%);border:2px solid #D97706;border-radius:10px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:relative;overflow:hidden;}\n.pv-bq::after{content:'';position:absolute;inset:-50%;background:radial-gradient(circle at center,#D9770622,transparent 60%);animation:bqPulse 3s infinite;}\n@keyframes bqPulse{0%,100%{opacity:.4;}50%{opacity:.9;}}\n.pv-bq-l{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}\n.pv-bq-icon{width:36px;height:36px;border-radius:8px;background:#D9770633;border:1px solid #D97706;color:#FCD34D;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;}\n.pv-bq-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:800;color:#FCD34D;line-height:1;}\n.pv-bq-sub{font-size:8.5px;color:#92400E;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;font-weight:800;}\n.pv-bq-r{text-align:right;position:relative;z-index:1;}\n.pv-bq-r-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#FCD34D;line-height:1;}\n.pv-bq-r-key{font-size:8px;color:#92400E;letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-top:3px;}\n\n/* outputs */\n.pv-outputs-trunk{height:14px;position:relative;}\n.pv-outputs-trunk svg{position:absolute;inset:0;width:100%;height:100%;}\n.pv-outputs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}\n.pv-out{background:#0A1628;border:1px solid #1E2D4E px;}\n.week-tab.active .week-tab-d{color:rgba(255,255,255,.7);}\n.week-tab.live.active .week-tab-d{color:rgba(28,18,8,.6);}\n\n/* Compact digest in preview */\n.preview-digest{display:flex;flex-direction:column;gap:11px;}\n.preview-digest-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}\n.preview-digest-kpi{background:#0A1628;border:1px solid #1E3A5F;border-radius:6px;padding:8px 9px;}\n.preview-digest-kpi-l{font-size:7.5px;font-weight:800;color:#475569;letter-spacing:.8px;text-transform:uppercase;}\n.preview-digest-kpi-v{font-size:13px;font-weight:800;color:#F1F5F9;font-family:'Playfair Display',serif;margin-top:4px;line-height:1;letter-spacing:-.3px;}\n.preview-digest-kpi-d{font-size:8.5px;font-family:'DM Mono',monospace;font-weight:700;margin-top:3px;letter-spacing:-.2px;}\n.preview-digest-kpi-d.up{color:#4ADE80;}\n.preview-digest-kpi-d.down{color:#FCA5A5;}\n.preview-digest-kpi-d.flat{color:#64748B;}\n.preview-digest-kpi-d.live{color:#FCD34D;}\n\n.preview-digest-secs{display:grid;grid-template-columns:1fr 1fr;gap:7px;}\n.preview-digest-sec{background:rgba(10,22,40,.5);border-radius:6px;padding:9px 10px;}\n.preview-digest-sec-hd{font-size:8.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px;}\n.preview-digest-sec.wins .preview-digest-sec-hd{color:#86EFAC;}\n.preview-digest-sec.flags .preview-digest-sec-hd{color:#FCD34D;}\n.preview-digest-item{font-size:10px;color:#CBD5E1;line-height:1.45;padding-left:10px;position:relative;}\n.preview-digest-item + .preview-digest-item{margin-top:6px;}\n.preview-digest-item::before{content:'•';position:absolute;left:0;color:#64748B;font-weight:700;}\n.preview-digest-item b{color:#F1F5F9;font-weight:700;}\n.preview-digest-item em{font-style:italic;color:#94A3B8;font-weight:500;}\n\n.preview-digest-priorities{padding-top:9px;border-top:1px dashed #1E3A5F;counter-reset:prev-priority;}\n.preview-digest-priorities-hd{font-size:8.5px;font-weight:800;le Fdiv>\n    <div class=\"conn-dot\" style=\"background:#22D3EE;animation-delay:1.4s;\"><\u002Fdiv>\n    <div class=\"conn-label\" style=\"background:#081F28;color:#22D3EE;border:1px solid #0891B2;\">Leads →<\u002Fdiv>\n    <div class=\"ei-node\" style=\"border-color:#0891B2;color:#22D3EE;font-size:8px;\">💰 MT4/MT5 FTD<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- S3 -->\n  <div class=\"layer-card\" id=\"card-s3\" onclick=\"sel('s3')\" style=\"border-color:#0891B2;background:linear-gradient(135deg,#081F28,#0C2535);\">\n    <div class=\"lc-inner\">\n      <div class=\"lc-top\">\n        <div class=\"lc-badge\">\n          <div class=\"lc-num\" style=\"background:#0891B222;color:#22D3EE;border:1px solid #0891B2;\">S3<\u002Fdiv>\n          <div class=\"lc-name\">Revenue Operations<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lc-kpi\" style=\"background:#081F28;color:#22D3EE;border:1px solid #0891B250;\">FTD 4.1 days<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lc-desc\">Lead scoring · CRM sync · FTD attribution · Deposit tracking · ROAS<\u002Fdiv>\n      <div class=\"lc-tags\"><div class=\"lc-tag\">Attribution<\u002Fdiv><div class=\"lc-tag\">Week 2<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"connector\">\n    <div class=\"conn-line\" style=\"background:linear-gradient(#0891B2,#7C3AED);\"><\u002Fdiv>\n    <div class=\"conn-dot\" style=\"background:#A78BFA;animation-delay:.8s;\"><\u002Fdiv>\n    <div class=\"conn-dot\" style=\"background:#A78BFA;animation-delay:1.7s;\"><\u002Fdiv>\n    <div class=\"conn-label\" style=\"background:#14082A;color:#A78BFA;border:1px solid #7C3AED;\">FTD data →<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- S4 -->\n  <div class=\"layer-card\" id=\"card-s4\" onclick=\"sel('s4')\" style=\"border-color:#7C3AED;background:linear-gradient(135deg,#14082A,#1A1040);\">\n    <div class=\"lc-inner\">\n      <div class=\"lc-top\">\n        <div class=\"lc-badge\">\n          <div class=\"lc-num\" style=\"background:#7C3AED22;color:#A78BFA;border:1px solid #7C3AED;\">S4<\u002Fdiv>\n          <div class=\"lc-name\">AI Automation + Signal<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lc-kpi\" style=\"background:#14082A;color:#A78BFA;border:1px solid #7C3AED50;\">&lt;4h detection<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lc-desc\">Micro-Signal 4×/day · Weekly Digest · AI Report · n8n automation<\u002Fdiv>\n      <div class=\"lc-tags\"><div class=\"lc-tag\">AI-powered<\u002Fdiv><div class=\"lc-tag\">Week 3<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"connector\">\n    <div class=\"conn-line\" style=\"background:linear-gradient(#7C3AED,#D97706);\"><\u002Fdiv>\n    <div class=\"conn-dot\" style=\"background:#FCD34D;animation-delay:1.1s;\"><\u002Fdiv>\n    <div class=\"conn-dot\" style=\"background:#FCD34D;animation-delay:2.0s;\"><\u002Fdiv>\n    <div class=\"conn-label\" style=\"background:#1C1208;color:#FCD34D;border:1px solid #D97706;\">Intelligence →<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- S5 -->\n  <div class=\"layer-card\" id=\"card-s5\" onclick=\"sel('s5')\" style=\"border-color:#D97706;background:linear-gradient(135deg,#1C1208,#221408);\">\n    <div class=\"lc-inner\">\n      <div class=\"lc-top\">\n        <div class=\"lc-badge\">\n          <div class=\"lc-num\" style=\"background:#D9770622;color:#FCD34D;border:1px solid #D97706;\">S5<\u002Fdiv>\n          <div class=\"lc-name\">Marketing Intelligence<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lc-kpi\" style=\"background:#1C1208;color:#FCD34D;border:1px solid #D9770650;\">100% visibility<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lc-desc\">CEO Dashboard · PPC Dashboard · ICP refinement loop · Channel ROI<\u002Fdiv>\n      <div class=\"lc-tags\"><div class=\"lc-tag\">Dashboards<\u002Fdiv><div class=\"lc-tag\">Week 3–4<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;justify-content:center;margin:4px 0;\"><div style=\"font-size:16px;color:#1E2D4E;\">↓<\u002Fdiv><\u002Fdiv>\n  <div style=\"font-size:9px;font-weight:700;color:#334155;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;\">Stakeholders<\u002Fdiv>\n  <div class=\"stakeholders\">\n    <div class=\"sh-node\" style=\"background:#1C1208;border:1px solid #D97706;color:#FCD34D;\">👤 CEO / Broker<\u002Fdiv>\n    <div class=\"sh-node\" style=\"background:#14082A;border:1px solid #7C3AED;color:#A78BFA;\">📊 Account Manager<\u002Fdiv>\n    <div class=\"sh-node\" style=\"background:#081F28;border:1px solid #0891B2;color:#22D3EE;\">📱 Marketer<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- RIGHT DETAIL -->\n<div class=\"detail\" id=\"detail\">\n\n  <div class=\"intro\" id=\"intro-screen\">\n    <div class=\"intro-icon\">⚡<\u002Fdiv>\n    <div class=\"intro-title\">Stablly · 5-Layer Stack<\u002Fdiv>\n    <div class=\"intro-sub\">Mỗi layer giải quyết một vấn đề cụ thể mà hầu hết forex broker đang gặp phải. Click vào từng layer để xem tại sao — và Stablly fix nó như thế nào.<\u002Fdiv>\n    <div class=\"intro-chips\">\n      <div class=\"ic\" style=\"border-color:#64748B;color:#94A3B8;\">S1 Tracking<\u002Fdiv>\n      <div class=\"ic-arrow\">→<\u002Fdiv>\n      <div class=\"ic\" style=\"border-color:#1A56DB;color:#60A5FA;\">S2 Campaigns<\u002Fdiv>\n      <div class=\"ic-arrow\">→<\u002Fdiv>\n      <div class=\"ic\" style=\"border-color:#0891B2;color:#22D3EE;\">S3 Revenue<\u002Fdiv>\n      <div class=\"ic-arrow\">→<\u002Fdiv>\n      <div class=\"ic\" style=\"border-color:#7C3AED;color:#A78BFA;\">S4 AI Signal<\u002Fdiv>\n      <div class=\"ic-arrow\">→<\u002Fdiv>\n      <div class=\"ic\" style=\"border-color:#D97706;color:#FCD34D;\">S5 Intelligence<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"det-content\" style=\"display:none;\" class=\"det-scroll\">\n    <div id=\"det-inner\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\nconst C={s1:\"#94A3B8\",s2:\"#60A5FA\",s3:\"#22D3EE\",s4:\"#A78BFA\",s5:\"#FCD34D\"};\nconst BG={s1:\"#1E2433\",s2:\"#0A1628\",s3:\"#081F28\",s4:\"#14082A\",s5:\"#1C1208\"};\nconst BRD={s1:\"#64748B\",s2:\"#1A56DB\",s3:\"#0891B2\",s4:\"#7C3AED\",s5:\"#D97706\"};\n\nconst LAYERS={\n  s1:{\n    num:\"S1\", name:\"Data Foundation\",\n    kicker:\"Foundation · Week 1 · Everything downstream depends on this\",\n    headline:\"Hầu hết forex broker đang chạy marketing trên dữ liệu sai — và không biết điều đó.\",\n    outcomes:[\n      {v:\"+20–40%\",k:\"Conversion data recovered\",c:\"#94A3B8\"},\n      {v:\"95%+\",k:\"Event match quality\",c:\"#4ADE80\"},\n      {v:\"Week 1\",k:\"Go-live target\",c:\"#94A3B8\"},\n    ],\n    problem:`<p>Kể từ iOS 14+, browser của Apple chặn <strong>30–40% conversion events<\u002Fstrong> trước khi chúng đến được Meta. Broker nhìn vào báo cáo, thấy CPA cao, nghĩ campaigns đang kém. Nhưng thực ra thuật toán Meta đang nhìn thấy thiếu FTDs — rồi optimize từ cái nhìn đó. Kết quả: target sai người, CPM cao hơn cần thiết, và CPA nhìn tệ hơn thực tế.<\u002Fp>\n\n<p>Nhưng Meta CAPI chỉ là một mảnh của bức tranh lớn hơn. <strong>TikTok Pixel<\u002Fstrong> cùng vấn đề — hầu hết broker chưa implement TikTok Events API, mất hoàn toàn conversion signal trên platform đang có CPM thấp nhất với forex audience ở Southeast Asia và Middle East. <strong>LinkedIn Insight Tag<\u002Fstrong> gần như không ai setup đúng — mất toàn bộ company size và job title data, không biết leads từ LinkedIn là fund manager hay retail trader.<\u002Fp>\n\n<p><strong>Landing page tracking<\u002Fstrong> thì thiếu: biết có người vào trang nhưng không biết họ scroll đến đâu, dừng lại ở form field nào, device nào load chậm đến mức bounce. Không có session recording, không có heatmap, không có form analytics. CRO không thể làm gì nếu không biết người dùng bỏ đi ở bước nào.<\u002Fp>\n\n<p><strong>Email platform<\u002Fstrong> thường được track độc lập — biết email có 35% open rate, nhưng không biết những người đó sau đó có submit form không, có FTD không. Email attribution gần như là con số không với hầu hết broker.<\u002Fp>\n\n<p><strong>MT4/MT5<\u002Fstrong> hoàn toàn tách biệt với marketing data. Không có pipeline nào kết nối deposit event từ trading platform về ad platform để tính ROAS thật. $10,000 spend vào Meta hay Google — không biết cái nào tốt hơn theo deposit thật.<\u002Fp>`,\n\n    fix:[\n      {i:\"🔄\",t:\"<strong>Server-side tracking cho tất cả ad platforms<\u002Fstrong> — Meta CAPI, Google Enhanced Conversions, TikTok Events API, LinkedIn CAPI. Events đi thẳng server-to-server, không qua browser, không bị iOS chặn. Match rate từ 60% lên 95%+ đồng thời trên tất cả platforms.\"},\n      {i:\"📊\",t:\"<strong>Landing page behavioral analytics đầy đủ<\u002Fstrong> — GA4 Server-Side với custom events cho mọi micro-interaction: scroll depth, form field focus/abandon, time on page, CTA clicks. Heatmap và session recording (Hotjar/Clarity) để thấy chính xác người dùng dừng lại ở đâu. Form analytics riêng để biết field nào đang gây drop-off.\"},\n      {i:\"📧\",t:\"<strong>Email closed-loop tracking<\u002Fstrong> — UTM parameters chuẩn hóa trên mọi email link. Conversion tracking từ email click → landing page → form submit → FTD được map thành 1 journey liên tục, không đứt đoạn.\"},\n      {i:\"🏦\",t:\"<strong>CRM full context từ ngày 1<\u002Fstrong> — mọi lead vào CRM đều kéo theo đầy đủ: UTM source, medium, campaign, ad set, keyword, landing page URL, device, GEO, session count. Sales team có context, attribution có data.\"},\n      {i:\"💰\",t:\"<strong>MT4/MT5 deposit pipeline<\u002Fstrong> — API connection với trading platform back-office. Deposit event → webhook → BigQuery → map về acquisition campaign. Lần đầu tiên ROAS thật được tính theo deposit amount, không phải FTD count.\"},\n      {i:\"🗄️\",t:\"<strong>BigQuery single source of truth<\u002Fstrong> — tất cả data từ mọi platform đổ về một data warehouse duy nhất. Không còn 'số Meta khác số Google khác số CRM' — một con số, một sự thật cho mọi quyết định downstream.\"},\n    ],\n\n    outcome:`<p>Meta algorithm thấy <strong>20–40% conversions nhiều hơn<\u002Fstrong> và bắt đầu optimize đúng người. CPL giảm 15–25% trong 60 ngày đầu — không phải vì Fx1 làm gì đặc biệt với campaigns, mà vì algorithm đang làm việc trên đủ dữ liệu lần đầu tiên.<\u002Fp>\n<p>S1 là điều kiện tiên quyết. Không có nó, <strong>mọi insight từ S2 đến S5 đều có thể sai<\u002Fstrong> vì được xây trên dữ liệu không đầy đủ. Đây là layer đầu tiên không phải vì ít quan trọng — mà vì không có nó thì không thể làm gì tiếp theo đúng được.<\u002Fp>`,\n    outColor:\"#94A3B8\",\n  },\n\n  s2:{\n    num:\"S2\", name:\"MarTech Execution\",\n    kicker:\"Multi-platform · Funnel design · CRO · Content compliance · Week 1–2\",\n    headline:\"Đây là layer mà broker tốn nhiều tiền nhất mà không biết tại sao.\",\n    outcomes:[\n      {v:\"CPL −28%\",k:\"Average after 60 days\",c:\"#60A5FA\"},\n      {v:\"5 KW types\",k:\"Keyword categories mapped\",c:\"#60A5FA\"},\n      {v:\"4 platforms\",k:\"Google · Meta · TikTok · Prog.\",c:\"#4ADE80\"},\n    ],\n    problem:`<p><strong>Landing page được làm sai từ đầu.<\u002Fstrong> Form 8–10 fields khi chỉ cần 3. Trust signals đặt sai chỗ. Mobile experience bị bỏ qua trong khi 60–70% traffic forex đến từ mobile. Load time 4–5 giây trên 3G trong khi chuẩn là dưới 2 giây. Và quan trọng hơn: cùng 1 landing page được dùng cho tất cả traffic sources — người click branded search UK và người click Meta retargeting AU nhận cùng 1 trang, cùng 1 message, dù intent level của họ hoàn toàn khác nhau.<\u002Fp>\n\n<p><strong>Budget phân bổ theo cảm tính.<\u002Fstrong> \"Meta 60%, Google 40%\" là con số phổ biến nhất — không dựa trên channel ROAS thực tế. Không có ICP fit analysis, không ai biết Google Display đang waste $1,100/tuần với 0 FTDs trong khi Email có ROAS 5.9× nhưng chỉ được cấp $580. Ngân sách đang chảy ngược.<\u002Fp>\n\n<p><strong>Compliance là điểm đau thầm lặng nhất.<\u002Fstrong> FCA, ASIC, CySEC, MAS — mỗi regulator có quy định riêng về cách quảng cáo forex: risk warning bắt buộc, không được hứa hẹn lợi nhuận, không dùng specific return figures. Ad copy viết bởi người không biết những rules này sẽ bị reject liên tục — hoặc tệ hơn là vi phạm mà không ai hay cho đến khi regulator gõ cửa.<\u002Fp>\n\n<p><strong>Keyword strategy của hầu hết broker chỉ có 2 loại: branded và generic.<\u002Fstrong> Đây là bỏ qua phần lớn value. \"Open account keywords\" — người đang trong quyết định mở tài khoản — là highest-intent traffic nhưng gần như không có broker nào đang capture đúng. Competitor keywords, promotion keywords, instrument-specific keywords đều bị bỏ ngỏ.<\u002Fp>\n\n<p><strong>TikTok và programmatic thì gần như không tồn tại.<\u002Fstrong> TikTok hiện là channel có CPM thấp nhất và reach rộng nhất ở Southeast Asia, Middle East — tất cả đều là growth markets cho forex. Programmatic display với contextual targeting trên financial news sites tạo ra brand recall cost-effective mà không broker nào đang tận dụng đúng.<\u002Fp>`,\n\n    fix:[\n      {i:\"👥\",t:\"<strong>Team có background fintech + trading<\u002Fstrong> — không phải generalist copywriter. Hiểu FCA/ASIC/CySEC compliance rules, biết cách viết ad copy đúng luật mà vẫn compelling. Hiểu psychology của trader — FOMO, fear of missing market movement — và dùng insight đó để viết content đúng trigger, đúng policy.\"},\n      {i:\"🗂️\",t:\"<strong>5 keyword categories được map riêng<\u002Fstrong> — Brand defense (bảo vệ branded search), Open account intent ('open forex account UK'), Platform/instrument specific ('MT4 broker', 'gold trading'), Competitor ('eToro alternative'), Promotion ('forex welcome bonus'). Mỗi loại: campaign riêng, ad copy riêng, landing page riêng, bid strategy riêng.\"},\n      {i:\"📐\",t:\"<strong>Funnel architecture đúng theo 3 stages<\u002Fstrong> — Top Funnel (awareness, đúng ICP mới, Meta/TikTok cold audience, educational content), Middle Funnel (consideration, retarget website visitors, comparison guides, platform demos), Bottom Funnel (conversion, high-intent search, offer pages, form retargeting). Không bao giờ dùng conversion objective cho cold audience.\"},\n      {i:\"🏠\",t:\"<strong>Landing pages riêng cho từng traffic source<\u002Fstrong> — UK branded search nhận page khác AU generic search. A/B test liên tục: headlines, form length, trust signal placement, CTA copy, page layout, above-fold design. Target: CVR từ 2–3% lên 6–8%.\"},\n      {i:\"📱\",t:\"<strong>Multi-platform execution đầy đủ<\u002Fstrong> — Google Ads (brand, competitor, exact/phrase/broad được layer đúng intent), Meta Ads (cold/warm/hot audience riêng biệt, creative strategy theo stage), TikTok (Spark Ads, In-Feed với native-style creative, không copy Meta creative), Programmatic (contextual targeting trên forex/financial news inventory).\"},\n      {i:\"🧪\",t:\"<strong>A/B testing framework systematic<\u002Fstrong> — không phải test ngẫu nhiên. Test headline vs headline, form 3-field vs 5-field, social proof format vs trust badge, urgency vs benefit-led CTA. Mỗi test có hypothesis, sample size target, và statistical significance threshold trước khi kết luận.\"},\n    ],\n\n    outcome:`<p>CPL giảm trung bình <strong>−28% trong 60 ngày<\u002Fstrong>. Không phải vì chi ít đi mà vì chi đúng chỗ hơn. Lead quality tăng vì right people đến qua right channel đúng intent. Không ad nào bị reject vì compliance, không violation nào.<\u002Fp>\n<p>Và lần đầu tiên, broker có visibility về việc từng $1 trong budget đang làm gì ở <strong>từng stage của funnel<\u002Fstrong> — không phải chỉ biết tổng spend và tổng leads.<\u002Fp>`,\n    outColor:\"#1A56DB\",\n  },\n\n  s3:{\n    num:\"S3\", name:\"Revenue Operations\",\n    kicker:\"Lead scoring · Attribution · FTD tracking · CRM sync · Week 2\",\n    headline:\"Leads đang đến — tiền đang rơi sau bước submit form.\",\n    outcomes:[\n      {v:\"4.1 days\",k:\"Lead-to-FTD (from 7+ days)\",c:\"#22D3EE\"},\n      {v:\"<60s\",k:\"Lead scored + routed to CRM\",c:\"#4ADE80\"},\n      {v:\"100%\",k:\"FTD attributed to source\",c:\"#22D3EE\"},\n    ],\n    problem:`<p><strong>Sales team đang gọi theo thứ tự FIFO — ai submit trước gọi trước.<\u002Fstrong> Lead từ một fund manager ở London với email @hedgefund.co.uk submit lúc 9AM thứ Sáu, đợi đến thứ Hai mới được gọi. Lead từ một student đang tìm \"free forex trading demo\" được gọi ngay hôm đó vì nằm đầu queue. Không ai biết cái nào có giá trị hơn.<\u002Fp>\n\n<p><strong>Timing quyết định tất cả nhưng hầu như không ai tối ưu nó.<\u002Fstrong> Research về financial services đồng thuận: lead warm nhất trong 5 phút đầu tiên sau khi submit. Sau 1 giờ: warm nhất còn 60%. Sau 24 giờ: 20%. Sau 5 ngày: dưới 5%. Hầu hết forex broker có response time 2–5 ngày. Họ đang gọi cho người đã quên mình từng submit form.<\u002Fp>\n\n<p><strong>Attribution bị mất hoàn toàn sau bước submit form.<\u002Fstrong> Marketing team biết Meta mang về 40 leads tuần này với CPL $180. Nhưng khi review FTDs, không ai biết trong 12 FTDs đó cái nào đến từ Meta, cái nào từ Google, cái nào từ Email. Sales team không tag nguồn trong CRM nhất quán. Result: marketing không thể optimize budget dựa trên channel nào tạo FTDs — chỉ optimize được trên channel nào tạo leads rẻ nhất. Lead rẻ không phải lúc nào cũng là lead convert.<\u002Fp>\n\n<p><strong>Deposit amount hoàn toàn invisible với marketing team.<\u002Fstrong> $1,190 CPA trông có vẻ đắt. Nhưng nếu biết những FTDs đó deposit trung bình $2,400 và ROAS tuần 1 là 2.0×, rolling 90 ngày là 4.2× — picture khác hoàn toàn. Hầu hết broker không có pipeline nào kết nối trading platform data về marketing attribution. MT4 và Google Ads tồn tại trong 2 thế giới riêng biệt.<\u002Fp>`,\n\n    fix:[\n      {i:\"🧠\",t:\"<strong>Lead scoring real-time — 12 signals<\u002Fstrong> — mỗi lead được score trong <60 giây từ khi submit form: GEO tier, IP quality, email domain type (personal vs corporate), time on page, UTM source, device type, thời điểm trong ngày, form completion time, return visitor hay new, language match, referral source, deposit intent signals. Score 0–100 → Tier A/B/C/D.\"},\n      {i:\"⚡\",t:\"<strong>Tier-based routing tự động<\u002Fstrong> — Tier A → Senior rep nhận notification ngay lập tức với đầy đủ context: đến từ đâu, đã xem gì, session history. Target response: <4 giờ trong business hours. Tier D → automated email nurture sequence, không waste senior sales time.\"},\n      {i:\"🔗\",t:\"<strong>Multi-touch FTD attribution<\u002Fstrong> — full journey được map: first touch (TikTok impression) → consideration (Google organic) → intent (branded search click) → form submit → email nurture click → FTD. Mỗi FTD được trace về đúng campaign nguồn với multiple attribution models available để compare.\"},\n      {i:\"💰\",t:\"<strong>MT4/MT5 deposit pipeline<\u002Fstrong> — API connection với trading platform back-office. Khi deposit event xảy ra → webhook về BigQuery → map về acquisition campaign. Marketing team thấy: Campaign A CPL $180, FTDs avg deposit $4,100. Campaign B CPL $90, FTDs avg deposit $800. Campaign A đắt hơn nhưng ROAS cao hơn 3×.\"},\n    ],\n\n    outcome:`<p>Lead-to-FTD từ 7+ ngày xuống <strong>4.1 ngày<\u002Fstrong>. Sales team gọi đúng người trước. Marketing team optimize budget dựa trên FTD chất lượng, không phải lead volume rẻ.<\u002Fp>\n<p>Và lần đầu tiên, <strong>ROAS thật — theo deposit amount, không theo FTD count<\u002Fstrong> — được tính và hiển thị. Broker biết channel nào đang thực sự tạo ra tiền, không phải chỉ tạo ra lead.<\u002Fp>`,\n    outColor:\"#0891B2\",\n  },\n\n  s4:{\n    num:\"S4\", name:\"AI Automation + Signal\",\n    kicker:\"AI Micro-Signal 4×/day · Weekly Digest · AI Report · Automation · Week 3\",\n    headline:\"Về cách một Account Manager đang thực sự làm việc — và tại sao nó không scale được.\",\n    outcomes:[\n      {v:\"<4h\",k:\"Anomaly detection\",c:\"#A78BFA\"},\n      {v:\"−3h/week\",k:\"AM reporting time saved\",c:\"#A78BFA\"},\n      {v:\"Mon 07:00\",k:\"Auto digest to broker\",c:\"#4ADE80\"},\n    ],\n    problem:`<p><strong>Thứ Hai sáng<\u002Fstrong>: AM mở Meta Ads Manager, Google Ads, email platform, CRM — rồi mở Excel bắt đầu copy-paste. 2–3 tiếng sau có một file báo cáo. Format lại. Thêm nhận xét. Gửi broker. Broker đọc 5 phút, hỏi 3 câu về số liệu mà AM cần thêm 30 phút để trả lời. Toàn bộ cycle này lặp lại mỗi tuần, không tạo ra giá trị gì ngoài việc vận chuyển thông tin vốn đã tồn tại trong các hệ thống.<\u002Fp>\n\n<p><strong>Không ai đang canh campaigns từ 8PM đến 8AM.<\u002Fstrong> CPA spike xảy ra lúc 01:44 UTC — Meta Broad Interest audience đột ngột tụt về zero conversion, $480 tiếp tục được burn. AM phát hiện lúc 9AM sáng hôm sau khi check dashboard thường nhật. \"Oh, CPA hôm qua cao bất thường.\" Pattern này không phải lỗi của AM — đây là structural problem: không có monitoring system thật sự.<\u002Fp>\n\n<p><strong>Broker thường không biết có vấn đề gì đang xảy ra cho đến khi họ chủ động hỏi.<\u002Fstrong> Không có proactive communication, không có threshold alerts. Thông tin từ AM thường reactive: \"tuần vừa rồi có vấn đề\" thay vì \"16:00 hôm qua tôi đã phát hiện và xử lý xong rồi.\"<\u002Fp>\n\n<p><strong>Báo cáo thường dừng lại ở thông tin, không phải insight.<\u002Fstrong> \"Meta CPA $1,200 tuần này\" là thông tin. \"Meta CPA $1,200 nhưng những FTDs đó deposit trung bình $4,100 — ROAS 3.4×. Email CPA $580 nhưng FTDs deposit trung bình $3,400 — ROAS 5.9×. Email đang outperform Meta theo ROAS thật nhưng chỉ được cấp 4% budget\" — đây mới là insight. Hầu hết báo cáo dừng lại ở thông tin.<\u002Fp>`,\n\n    fix:[\n      {i:\"⚡\",t:\"<strong>AI Micro-Signal — 4 lần mỗi ngày<\u002Fstrong> — 08:00, 12:00, 16:00, 20:00 UTC. Mỗi cycle check: CPA theo channel vs baseline, spend pace vs daily budget, lead volume pace, Tier A lead response time, CTR trend, creative frequency threshold. Breach → alert AM qua Telegram/Slack ngay lập tức với context đầy đủ và suggested action. Không breach → không có gì được gửi. Im lặng là confirmation mọi thứ bình thường.\"},\n      {i:\"📧\",t:\"<strong>Weekly Digest tự động — thứ Hai 07:00 UTC<\u002Fstrong> — broker nhận email: spend, leads, FTDs, ROAS, 2 wins của tuần với attribution, 2 flags đang được xử lý với AM handling status, next week targets. Đọc được trong 5 phút. Không cần hỏi AM, không cần chờ 1–2 ngày. Broker biết tình trạng account trước khi bắt đầu ngày làm việc.\"},\n      {i:\"📊\",t:\"<strong>Weekly AI Optimization Report cho AM<\u002Fstrong> — cùng thứ Hai, AM nhận report riêng với chiều sâu khác: 7-day trend analysis, 3–5 prioritized actions với expected impact cụ thể, budget reallocation recommendations dựa trên ROAS data, creative performance breakdown. AM đọc trong 15 phút, có action plan rõ ràng. Thay vì 3 tiếng để analyze, 15 phút để act.\"},\n      {i:\"🤖\",t:\"<strong>Ongoing automation pipeline<\u002Fstrong> — lead nurture sequences tự động trigger theo Tier từ S3 (Tier B nhận sequence khác Tier C). AI chatbot trên landing page handle initial qualification 24/7 — không bỏ qua lead ngoài business hours. Content repurposing automation biến 1 piece thành nhiều format across channels.\"},\n    ],\n\n    outcome:`<p>Anomaly detection: từ \"ngày hôm sau\" xuống <strong><4 giờ<\u002Fstrong>. AM tiết kiệm 3–4 tiếng/tuần từ manual reporting và dùng thời gian đó cho strategy thật sự. Broker nhận tín hiệu rõ ràng mỗi thứ Hai sáng — tốt hay không tốt, tại sao, và tuần tới làm gì.<\u002Fp>\n<p><strong>Dynamic thay đổi từ reactive thành proactive.<\u002Fstrong> Không còn \"tôi không biết có vấn đề gì cho đến khi AM báo.\" Mọi vấn đề được detect và handle trong ngày, không phải tuần.<\u002Fp>`,\n    outColor:\"#7C3AED\",\n  },\n\n  s5:{\n    num:\"S5\", name:\"Marketing Intelligence\",\n    kicker:\"CEO Dashboard · PPC Dashboard · ICP Refinement · Week 3–4\",\n    headline:\"Vấn đề không phải là thiếu data. Vấn đề là data đang ở khắp nơi nhưng không ở đúng chỗ.\",\n    outcomes:[\n      {v:\"100%\",k:\"CEO visibility — no AM needed\",c:\"#FCD34D\"},\n      {v:\"4h\",k:\"Dashboard auto-refresh cycle\",c:\"#FCD34D\"},\n      {v:\"−15%\",k:\"CPA continues improving (60 days)\",c:\"#4ADE80\"},\n    ],\n    problem:`<p><strong>CEO muốn biết tuần vừa rồi campaigns chạy thế nào.<\u002Fstrong> Hỏi AM. AM mở 4–5 platforms khác nhau, compile số liệu, format báo cáo — 1–2 ngày sau gửi file. Trong 1–2 ngày đó, decisions về budget tuần tới đã phải được đưa ra dựa trên cảm tính.<\u002Fp>\n\n<p><strong>Marketer và CEO đang nhìn cùng account nhưng thấy hai thực tại khác nhau.<\u002Fstrong> Marketer nhìn Meta Ads Manager: CPL $100. CEO nhìn CRM: 45 leads. Finance nhìn MT4: 12 FTDs, $28,800 deposits. Ba con số từ ba hệ thống, không ai đang kết nối chúng thành một picture coherent. Kết quả: Marketer tối ưu CPL, CEO tối ưu FTD count, Finance tối ưu deposit volume — không ai đang tối ưu ROAS thật theo từng channel.<\u002Fp>\n\n<p><strong>Cái gap nguy hiểm nhất: không ai đang nhìn channel ROI theo FTD và deposit — chỉ nhìn theo leads và CPL.<\u002Fstrong> Meta Broad Interest có CPL $90 — trông rẻ nhất portfolio. Nhưng những leads đó convert thành FTDs ở 0.8%, avg deposit $600. Google Brand KW có CPL $180 — trông đắt nhất. Nhưng convert 14.3%, avg deposit $4,100. Nếu chỉ nhìn CPL, Google Brand trông như đang thất bại. Nếu nhìn ROAS, Google Brand là channel duy nhất nên scale.<\u002Fp>\n\n<p><strong>ICP là cái mà không ai đang làm nhưng có tác động lớn nhất về dài hạn.<\u002Fstrong> Tuần 1: ICP là \"forex traders, male, 25–45, interested in finance.\" Generic. Sau 8 tuần data từ actual depositors: ICP thật là desktop, 35–44, UK primary, branded search, business email domain, 2nd+ visit trước khi submit, avg deposit $2,400. Không ai đang feed thông tin này ngược lại vào targeting để tiếp tục cải thiện.<\u002Fp>`,\n\n    fix:[\n      {i:\"👔\",t:\"<strong>CEO Dashboard — business view, không phải campaign view<\u002Fstrong> — 5 KPI cards: Spend, Leads, FTDs, Total Deposits, ROAS. 3 Priority Actions của tuần do AI xác định. Channel ROI hiển thị Total Deposits và ROAS per channel và per campaign — không chỉ CPL. Month Forecast dự báo FTD, CPA, Deposits theo current trajectory. AI Brief generate executive summary khi CEO click một nút.\"},\n      {i:\"📱\",t:\"<strong>PPC/Marketer Dashboard — execution view đầy đủ<\u002Fstrong> — 7 tabs: This Week checklist (sorted by impact), Overview với Campaign Quality Bridge (Campaign → Lead Quality → LTV, không chỉ CPL), Google Ads keyword-level + QS breakdown, Meta ToFu/MoFu/BoFu funnel, Landing Pages CVR per source, Email performance, Attribution model comparison.\"},\n      {i:\"🎯\",t:\"<strong>ICP Refinement loop tự động<\u002Fstrong> — mỗi tuần, data từ actual depositors trong S3 được feed vào ICP model. Profile của người thực sự deposit — không phải industry average — trở thành foundation cho targeting tuần tiếp theo. Được hiển thị trong Trends tab: Tier A% tăng từ tuần nào, GEO nào đang pull quality cao hơn, device shift như thế nào.\"},\n      {i:\"🔄\",t:\"<strong>4-hour auto-refresh, không cần làm gì<\u002Fstrong> — dashboard tự update mỗi 4 tiếng. CEO mở vào bất kỳ lúc nào đều thấy data gần nhất. Không cần request báo cáo, không cần chờ AM, không cần log vào Meta hay Google.\"},\n    ],\n\n    outcome:`<p>CEO có thể trả lời \"campaigns đang chạy thế nào?\" trong 30 giây mà không cần hỏi AM hay mở bất kỳ ad platform nào. Marketer có đủ data để tự optimize mà không phụ thuộc vào CEO approve từng micro-decision. Cả hai nhìn cùng data từ đúng lens của mình.<\u002Fp>\n<p>Và quan trọng hơn: <strong>hệ thống đang tiếp tục tự cải thiện mỗi tuần<\u002Fstrong> — ICP model ngày càng chính xác hơn, targeting ngày càng sharp hơn, CPA tiếp tục giảm không phải từ một fix lớn mà từ sự tích lũy của học liên tục. −15% CPL trong 60 ngày tiếp theo, không cần thêm budget.<\u002Fp>`,\n    outColor:\"#D97706\",\n  },\n};\n\nfunction sel(id){\n  ['s1','s2','s3','s4','s5'].forEach(s=>{\n    const c=document.getElementById('card-'+s);\n    if(s===id) c.classList.add('selected');\n    else c.classList.remove('selected');\n  });\n  if(id==='s1') renderS1Visual();\n  else if(id==='s2') renderS2Visual();\n  else if(id==='s3') renderS3Visual();\n  else if(id==='s4') renderS4Visual();\n  else if(id==='s5') renderS5Visual();\n  else render(id);\n  rebuildTweaksPanel(id);\n}\n\n/* ═══════════════════════════════════════\n   S1 VISUAL MODE — 3 variations\n   ═══════════════════════════════════════ */\nconst S1_TWEAKS = /*EDITMODE-BEGIN*/{\n  \"archView\": \"stack\",\n  \"s2View\": \"cards\",\n  \"s3View\": \"scoring\",\n  \"s4View\": \"clock\",\n  \"s5View\": \"dashboard\",\n  \"showAnimations\": true,\n  \"showTooltips\": true\n}/*EDITMODE-END*/;\n\nconst TWEAKS = {...S1_TWEAKS};\n\n// LEAK MAP DATA (problem state — % data lost)\nconst LEAKS = [\n  {cls:'lr-meta', logo:'f', name:'Meta Pixel', sub:'Browser-side', pct:40, cap:60,\n   tip:'iOS 14+ ATT chặn ~30–40% events trước khi đến Meta. Algorithm optimize trên dataset thiếu → CPA cao giả tạo, audience targeting drift.'},\n  {cls:'lr-google', logo:'G', name:'Google Conv.', sub:'gtag.js basic', pct:35, cap:65,\n   tip:'Enhanced Conversions chưa setup. Mất hashed user data → Smart Bidding signal yếu, GA4 audience attribution không liên tục.'},\n  {cls:'lr-tiktok', logo:'♪', name:'TikTok Pixel', sub:'Not implemented', pct:100, cap:0,\n   tip:'TikTok Events API chưa được implement. Mất hoàn toàn signal trên platform CPM thấp nhất cho forex audience SEA/MEA.'},\n  {cls:'lr-linkedin', logo:'in', name:'LinkedIn IT', sub:'Setup sai', pct:80, cap:20,\n   tip:'Mất company size, job title data. Không phân biệt được fund manager vs retail trader → mất khả năng targeting B2B forex segment.'},\n  {cls:'lr-landing', logo:'LP', name:'Landing Pages', sub:'Pageview only', pct:70, cap:30,\n   tip:'Không có scroll depth, form analytics, heatmap, session recording. CRO không thể optimize gì nếu không biết user drop ở đâu.'},\n  {cls:'lr-mt4', logo:'$', name:'MT4 / MT5', sub:'Siloed', pct:100, cap:0,\n   tip:'Trading platform tách biệt hoàn toàn với marketing data. Không pipeline deposit → ROAS thật theo deposit không thể tính.'},\n];\n\n// PIPELINE / HUB SOURCES (solution state — after Fx1)\nconst SRCS = [\n  {cls:'lr-meta', logo:'f', name:'Meta', api:'CAPI', stat:'95%+',\n   tip:'<b>Meta CAPI<\u002Fb>: events đi server-to-server, bypass iOS ATT. Match rate: 60% → 95%+. Algorithm nhìn đủ FTDs → optimize đúng audience.'},\n  {cls:'lr-google', logo:'G', name:'Google', api:'EC + GA4 SS', stat:'98%',\n   tip:'<b>Google Enhanced Conversions<\u002Fb> + GA4 Server-Side. Hashed user data, encrypted. Coverage 65% → 98%.'},\n  {cls:'lr-tiktok', logo:'♪', name:'TikTok', api:'Events API', stat:'95%+',\n   tip:'<b>TikTok Events API<\u002Fb> server-side. Unlock platform CPM thấp nhất cho forex audience SEA + Middle East.'},\n  {cls:'lr-linkedin', logo:'in', name:'LinkedIn', api:'CAPI', stat:'95%+',\n   tip:'<b>LinkedIn CAPI<\u002Fb> với firmographic enrichment. Phân biệt fund manager vs retail trader → premium B2B targeting.'},\n  {cls:'lr-landing', logo:'LP', name:'Landing', api:'GA4 SS + Hotjar', stat:'100%',\n   tip:'<b>GA4 Server-Side<\u002Fb> + Hotjar/Clarity. Scroll, form analytics, heatmap, session recording. CRO có data đầy đủ.'},\n  {cls:'lr-mt4', logo:'$', name:'MT4/MT5', api:'Webhook → BQ', stat:'100%',\n   tip:'<b>MT4 API → BigQuery<\u002Fb>. Deposit event map về acquisition campaign. ROAS thật theo deposit amount, không phải FTD count.'},\n];\n\n// STACK CARDS (technical solutions deep)\nconst STACK = [\n  {cls:'lr-meta', logo:'f', name:'Meta CAPI', api:'Conversions API',\n   body:'Server-to-server event pipeline, bypass iOS ATT browser blocking. Algorithm nhận đủ FTD signal lần đầu tiên.',\n   before:'60%', after:'95%+', label:'Match'},\n  {cls:'lr-google', logo:'G', name:'Google EC', api:'Enhanced Conv. + GA4 SS',\n   body:'Hashed user data encrypted, Smart Bidding nhận đủ signal cho high-intent keywords. GA4 đo end-to-end.',\n   before:'65%', after:'98%', label:'Coverage'},\n  {cls:'lr-tiktok', etElementById('arch-view-container').innerHTML = renderArchView();\n  // Sync tweaks panel radios\n  document.querySelectorAll('.tweaks-panel .tp-radio-btn[data-view]').forEach(b=>{\n    b.classList.toggle('active', b.dataset.view===v);\n  });\n}\n\nfunction renderArchView(){\n  if(TWEAKS.archView==='hub') return renderHub();\n  if(TWEAKS.archView==='stack') return renderStack();\n  return renderPipeline();\n}\n\nfunction renderPipeline(){\n  const srcs = SRCS.map(s=>`\n    <div class=\"pv-src\">\n      <div class=\"pv-src-logo ${s.cls}\">${s.logo}<\u002Fdiv>\n      <div class=\"pv-src-name\">${s.name}<\u002Fdiv>\n      <div class=\"pv-src-api\">${s.api}<\u002Fdiv>\n      <div class=\"pv-src-stat\">${s.stat}<\u002Fdiv>\n      <div class=\"tip cyan\">${s.tip}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  return `\n    <div class=\"arch-frame\" data-label=\"FX1 SERVER-SIDE PIPELINE\" data-meta=\"6 sources → 1 truth\">\n      <div class=\"pv-sources\">${srcs}<\u002Fdiv>\n      <div class=\"pv-funnel\">\n        <svg viewBox=\"0 0 100 30\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%;\">\n          <path d=\"M 4 0 L 50 28 L 96 0\" fill=\"none\" stroke=\"#1E3A5F\" stroke-width=\"1\" stroke-dasharray=\"2 2\" vector-effect=\"non-scaling-stroke\"/>\n          <path d=\"M 17 0 L 50 28\" fill=\"none\" stroke=\"#1E3A5F\" stroke-width=\"1\" stroke-dasharray=\"2 2\" vector-effect=\"non-scaling-stroke\"/>\n          <path d=\"M 30 0 L 50 28\" fill=\"none\" stroke=\"#1E3A5F\" stroke-width=\"1\" stroke-dasharray=\"2 2\" vector-effect=\"non-scaling-stroke\"/>\n          <path d=\"M 70 0 L 50 28\" fill=\"none\" stroke=\"#1E3A5F\" stroke-width=\"1\" stroke-dasharray=\"2 2\" vector-effect=\"non-scaling-stroke\"/>\n          <path d=\"M 83 0 L 50 28\" fill=\"none\" stroke=\"#1E3A5F\" stroke-width=\"1\" stroke-dasharray=\"2 2\" vector-effect=\"non-scaling-stroke\"/>\n        <\u002Fsvg>\n        <div class=\"pv-funnel-dot\" style=\"animation-delay:0s;\"><\u002Fdiv>\n        <div class=\"pv-funnel-dot\" style=\"animation-delay:.55s;\"><\u002Fdiv>\n        <div class=\"pv-funnel-dot\" style=\"animation-delay:1.1s;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pv-ssl\">\n        <div class=\"pv-ssl-l\">\n          <div class=\"pv-ssl-icon\">⚡<\u002Fdiv>\n          <div>\n            <div class=\"pv-ssl-title\">SERVER-SIDE EVENT LAYER<\u002Fdiv>\n            <div class=\"pv-ssl-sub\">Cloudflare Workers · GTM SS · Event deduplication · Identity stitch<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pv-ssl-r\">\n          <span class=\"pv-ssl-chip\">UTM unified<\u002Fspan>\n          <span class=\"pv-ssl-chip\">Hashed PII<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pv-trunk\">\n        <div class=\"pv-trunk-line\"><\u002Fdiv>\n        <div class=\"pv-trunk-dot\" style=\"animation-delay:0s;\"><\u002Fdiv>\n        <div class=\"pv-trunk-dot\" style=\"animation-delay:.85s;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pv-bq\">\n        <div class=\"pv-bq-l\">\n          <div class=\"pv-bq-icon\">▦<\u002Fdiv>\n          <div>\n            <div class=\"pv-bq-title\">BigQuery<\u002Fdiv>\n            <div class=\"pv-bq-sub\">SINGLE SOURCE OF TRUTH<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pv-bq-r\">\n          <div class=\"pv-bq-r-val\">1×<\u002Fdiv>\n          <div class=\"pv-bq-r-key\">UNIFIED DATA<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pv-outputs-trunk\">\n        <svg viewBox=\"0 0 100 14\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%;\">\n          <path d=\"M50 0 L50 6 L17 6 L17 14\" fill=\"none\" stroke=\"#D9770680\" stroke-width=\"1\" stroke-dasharray=\"2 2\" vector-effect=\"non-scaling-stroke\"/>\n          <path d=\"M50 0 L50 14\" fill=\"none\" stroke=\"#D9770680\" stroke-width=\"1\" stroke-dasharray=\"2 2\" vector-effect=\"n 02Fdiv>\n            <div class=\"s1v-sec-sub2\">Kết quả Fx1 cam kết trong <b>60 ngày đầu<\u002Fb><\u002Fdiv>\n            <div class=\"s1v-sec-meta2\">Speed · Coverage · Leverage · Proactive comms<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"outcome-strip\">\n          <div class=\"outcome-row four\">\n            <div class=\"outcome-cell\">\n              <div class=\"outcome-cell-val\">&lt;4h<\u002Fdiv>\n              <div class=\"outcome-cell-key\"><b>Anomaly detection<\u002Fb><br>từ \"next day\"<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"outcome-cell\">\n              <div class=\"outcome-cell-val\">−3h/wk<\u002Fdiv>\n              <div class=\"outcome-cell-key\"><b>AM time saved<\u002Fb><br>auto reporting<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"outcome-cell\">\n              <div class=\"outcome-cell-val\">4×/day<\u002Fdiv>\n              <div class=\"outcome-cell-key\"><b>Signal cycles<\u002Fb><br>08·12·16·20 UTC<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"outcome-cell\">\n              <div class=\"outcome-cell-val\">Mon 07:00<\u002Fdiv>\n              <div class=\"outcome-cell-key\"><b>Auto digest<\u002Fb><br>to broker, every week<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"outcome-tag\">\n            <b>S4 không phải dashboard<\u002Fb> — S4 là turn reactive ops thành proactive intelligence.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction setS4View(v){\n  TWEAKS.s4View = v;\n  persistTweak('s4View', v);\n  document.querySelectorAll('.s1v-sec-card.cyan .view-switcher .vs-btn').forEach(b=>{\n    b.classList.toggle('active', b.textContent.toLowerCase()===v);\n  });\n  document.getElementById('s4-view-container').innerHTML = renderS4ArchView();\n  document.querySelectorAll('.tweaks-panel .tp-radio-btn[data-s4view]').forEach(b=>{\n    b.classList.toggle('active', b.dataset.s4view===v);\n  });\n}\n\nfunction renderS4ArchView(){\n  if(TWEAKS.s4View==='alerts') return renderAlertStream();\n  if(TWEAKS.s4View==='digest') return renderDigest();\n  return renderClock();\n}\n\nfunction clockSvg(){\n  const cx=180, cy=180, ringR=160;\n  let svg = `<svg viewBox=\"0 0 360 360\" class=\"clock-svg\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <linearGradient id=\"sweep-grad\" x1=\"0\" y1=\"1\" x2=\"0\" y2=\"0\">\n        <stop offset=\"0%\" stop-color=\"#A78BFA\" stop-opacity=\"0\"/>\n        <stop offset=\"60%\" stop-color=\"#A78BFA\" stop-opacity=\".25\"/>\n        <stop offset=\"100%\" stop-color=\"#A78BFA\" stop-opacity=\".75\"/>\n      <\u002FlinearGradient>\n    <\u002Fdefs>`;\n\n  // outer ring\n  svg += `<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${ringR}\" class=\"clock-ring\"/>`;\n\n  // hour ticks 0-23\n  for(let h=0; h<24; h++){\n    const a = (h/24)*Math.PI*2 - Math.PI/2;\n    const isMajor = h%6===0;\n    const r1 = isMajor ? 148 : 155;\n    const r2 = ringR;\n    const x1 = cx + r1*Math.cos(a), y1 = cy + r1*Math.sin(a);\n    const x2 = cx + r2*Math.cos(a), y2 = cy + r2*Math.sin(a);\n    svg += `<line x1=\"${x1.toFixed(1)}\" y1=\"${y1.toFixed(1)}\" x2=\"${x2.toFixed(1)}\" y2=\"${y2.toFixed(1)}\" class=\"clock-tick${isMajor?' clock-tick-major':''}\"/>`;\n  }\n\n  // cardinal labels\n  [0,6,12,18].forEach(h=>{\n    const a = (h/24)*Math.PI*2 - Math.PI/2;\n    const r = 184;\n    const x = cx + r*Math.cos(a);\n    const y = cy + r*Math.sin(a);\n    svg += `<text x=\"${x.toFixed(1)}\" y=\"${(y+4).toFixed(1)}\" text-anchor=\"middle\" class=\"clock-hour-label\">${h.toString().padStart(2,'0')}<\u002Ftext>`;\n  });\n\n  // sweep arm\n  svg += `<g class=\"clock-sweep\">\n    <line x1=\"${cx}\" y1=\"${cy}\" x2=\"${cx}\" y2=\"${cy-150}\" class=\"clock-sweep-line\"/>\n    <circle cx=\"${cx}\" cy=\"${cy-150}\" r=\"3.5\" class=\"clock-sweep-head\"/>\n  <\u002Fg>`;\n\n  // cycle markers + digest\n  CLOCK_CYCLES.forEach(c=>{\n    const a = (c.hour/24)*Math.PI*2 - Math.PI/2;\n    const x = cx + ringR*Math.cos(a);\n    const y = cy + ringR*Math.sin(a);\n    if(c.kind==='digest'){\n      const activeAttr = (s4SelectedMarker==='digest') ? ' active' : '';\n      svg += `<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"16\" style=\"fill:#FCD34D;opacity:.22;filter:blur(6px);\"/>`;\n      svg += `<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"11\" class=\"clock-digest-bg${activeAttr}\" data-marker=\"digest\" onclick=\"selectMarker('digest')\"/>`;\n      svg += `<text x=\"${x.toFixed(1)}\" y=\"${(y+5).toFixed(1)}\" text-anchor=\"middle\" class=\"clock-digest-star\" style=\"font-size:14px;font-weight:800;\">★<\u002Ftext>`;\n    } else {\n      const activeAttr = (s4SelectedMarker===String(c.hour)) ? ' active' : '';\n      svg += `<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"14\" class=\"clock-cycle-glow\"/>`;\n      svg += `<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"9\" class=\"clock-cycle${activeAttr}\" data-marker=\"${c.hour}\" onclick=\"selectMarker(${c.hour})\"/>`;\n      svg += `<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"3\" class=\"clock-cycle-dot\"/>`;\n    }\n  });\n\n  svg += '<\u002Fsvg>';\n  return svg;\n}\n\n/* ─── Multi-week digest + signal demo state ─── */\nlet s4SelectedMarker = 'digest';\nlet s4SelectedWeek = 'w47';\n\nconst WEEKS = [\n  {key:'w45', label:'Week 45', date:'Nov 4–10', live:false,\n   kpis:[\n     {l:'SPEND', v:'$26,200', d:'baseline', dir:'flat'},\n     {l:'LEADS', v:'119', d:'baseline', dir:'flat'},\n     {l:'FTDs', v:'11', d:'baseline', dir:'flat'},\n     {l:'ROAS', v:'2.8×', d:'baseline', dir:'flat'},\n   ],\n   wins:[\n     '<b>Scoring engine deployed<\u002Fb> · Tier A/B/C/D routing live for all leads',\n     '<b>Baseline CPA established<\u002Fb> for 4 channels (Meta, Google, Email, Programmatic)',\n   ],\n   flags:[\n     '<b>Meta CPA $215<\u002Fb> (industry avg $180) — <em>under investigation<\u002Fem>',\n     '<b>Landi tection', meta4:'14s after threshold', meta5:'Routed to', meta6:'AM on-call'},\n  '16': {hour:'16:00 UTC', tag:'FLAG', kind:'flag', icon:'⚑',\n         body:'<b>Tier A SLA breach<\u002Fb> · Response time avg 5.8h vs target &lt;4h · 3 leads affected · Senior rep capacity issue',\n         detail:'<b>Action taken automatically<\u002Fb>: push notification sent to senior rep on-call (escalation #2). Auto-escalation workflow triggered. Backlog of 3 Tier A leads queued with full context (UTM, scoring, journey history).',\n         meta1:'Severity', meta2:'MEDIUM', meta3:'Elapsed', meta4:'23m', meta5:'Workflow', meta6:'Auto-escalated'},\n  '20': {hour:'20:00 UTC', tag:'DAY CLOSE', kind:'clear', icon:'✓',\n         body:'<b>Daily summary<\u002Fb> · 1 alert + 1 flag resolved within hours · Spend $3,840 · Leads 24 (Tier A: 4) · FTDs 3 · No overnight risk',\n         detail:'<b>Day wrap<\u002Fb>: All anomalies resolved before close. Continuing campaigns have overnight thresholds set (auto-pause if CPA &gt; +50% baseline). AM handed off to overnight monitoring agent. Next AM check: 08:00 UTC.',\n         meta1:'Daily status', meta2:'CLEAN', meta3:'Overnight', meta4:'Auto-monitored', meta5:'Next AM', meta6:'08:00 UTC'},\n};\n\nfunction selectMarker(marker){\n  s4SelectedMarker = String(marker);\n  const c = document.getElementById('clock-preview');\n  if(c) c.innerHTML = renderClockPreview();\n  // toggle active class on markers\n  document.querySelectorAll('[data-marker]').forEach(el=>{\n    el.classList.toggle('active', el.getAttribute('data-marker') === s4SelectedMarker);\n  });\n}\n\nfunction setWeek(key){\n  s4SelectedWeek = key;\n  const c = document.getElementById('clock-preview');\n  if(c) c.innerHTML = renderClockPreview();\n}\n\nfunction renderClockPreview(){\n  if(s4SelectedMarker === 'digest') return renderWeeklyInbox();\n  return renderSignalDemo(s4SelectedMarker);\n}\n\nfunction renderWeeklyInbox(){\n  const week = WEEKS.find(w => w.key === s4SelectedWeek) || WEEKS
