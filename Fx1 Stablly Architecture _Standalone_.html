">ICP Loop<\u002Fbutton>\n              <button class=\"vs-btn ${TWEAKS.s5View==='truth'?'active':''}\" onclick=\"setS5View('truth')\">Truth Table<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div id=\"s5-view-container\">${renderS5ArchView()}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- BLOCK 3 -->\n      <div class=\"s1v-sec-card green\">\n        <div class=\"s1v-sec-hd2\">\n          <div class=\"s1v-sec-badge\">03<\u002Fdiv>\n          <div class=\"s1v-sec-titles\">\n            <div class=\"s1v-sec-title2\">Outcome<\u002Fdiv>\n            <div class=\"s1v-sec-sub2\">Kết quả Fx1 cam kết trong <b>60 ngày tiếp theo<\u002Fb><\u002Fdiv>\n            <div class=\"s1v-sec-meta2\">Visibility · Self-service · Continuously self-improving<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"outcome-strip\">\n          <div class=\"outcome-row four\">\n            <div class=\"outcome-cell\">\n              <div class=\"outcome-cell-val\">100%<\u002Fdiv>\n              <div class=\"outcome-cell-key\"><b>CEO visibility<\u002Fb><br>no AM in loop<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"outcome-cell\">\n              <div class=\"outcome-cell-val\">30s<\u002Fdiv>\n              <div class=\"outcome-cell-key\"><b>Time-to-answer<\u002Fb><br>\"how's it going?\"<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"outcome-cell\">\n              <div class=\"outcome-cell-val\">4h<\u002Fdiv>\n              <div class=\"outcome-cell-key\"><b>Auto refresh<\u002Fb><br>no manual request<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"outcome-cell\">\n              <div class=\"outcome-cell-val\">−15%<\u002Fdiv>\n              <div class=\"outcome-cell-key\"><b>CPA continues ↓<\u002Fb><br>self-improving system<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"outcome-tag\">\n            <b>S5 không phải reporting<\u002Fb> — S5 là biến data thành quyết định ai cũng đưa được, mỗi tuần better than the last.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction setS5View(v){\n  TWEAKS.s5View = v;\n  persistTweak('s5View', v);\n  document.querySelectorAll('.s1v-sec-card.cyan .view-switcher .vs-btn').forEach(b=>{\n    const label = b.textContent.toLowerCase();\n    const map = {'dashboard':'dashboard','icp loop':'icp','truth table':'truth'};\n    b.classList.toggle('active', map[label]===v);\n  });\n  document.getElementById('s5-view-container').innerHTML = renderS5ArchView();\n  document.querySelectorAll('.tweaks-panel .tp-radio-btn[data-s5view]').forEach(b=>{\n    b.classList.toggle('active', b.dataset.s5view===v);\n  });\n}\n\nfunction renderS5ArchView(){\n  if(TWEAKS.s5View==='icp') return renderICPLoop();\n  if(TWEAKS.s5View==='truth') return renderTruthTable();\n  return renderDashboards();\n}\n\nfunction renderDashboards(){\n  const ceoKpis = CEO_DASH.kpis.map(k=>`\n    <div class=\"dash-kpi\">\n      <div class=\"dash-kpi-l\">${k.l}<\u002Fdiv>\n      <div class=\"dash-kpi-v\">${k.v}<\u002Fdiv>\n      <div class=\"dash-kpi-d ${k.dir}\">${k.d}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  const ceoChannels = CEO_DASH.channels.map(c=>`\n    <div class=\"dash-roi-row ${c.top?'top':''}\">\n      <div class=\"dash-roi-name\">${c.name}<\u002Fdiv>\n      <div class=\"dash-roi-dep\">${c.deposits}<\u002Fdiv>\n      <div class=\"dash-roi-roas ${c.best?'best':''}\">${c.roas}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  const ceoActions = CEO_DASH.actions.map(a=>`<div class=\"dash-action\">${a}<\u002Fdiv>`).join('');\n\n  const ppcTabs = PPC_DASH.tabs.map((t,i)=>`\n    <button class=\"dash-tab ${i===PPC_DASH.activeTab?'active':''}\">${t}<\u002Fbutton>\n  `).join('');\n\n  const ppcChecks = PPC_DASH.checks.map(c=>`\n    <div class=\"dash-check\">\n      <div class=\"dash-check-box\"><\u002Fdiv>\n      <div class=\"dash-check-pri ${c.pri}\">${c.pri.toUpperCase()}<\u002Fdiv>\n      <div class=\"dash-check-body\">${c.body}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  const ppcBridgeRows = PPC_DASH.bridge.map(b=>`\n    <div class=\"dash-bridge-row\">\n      <div class=\"dash-bridge-name\">${b.name}<\u002Fdiv>\n      <div class=\"dash-bridge-cell ${b.class}\">Q ${b.q}<\u002Fdiv>\n      <div class=\"dash-bridge-cell ${b.class}\">${b.t}<\u002Fdiv>\n      <div class=\"dash-bridge-cell ${b.class}\">${b.ltv}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  return `\n    <div class=\"dash-frame\">\n      <div class=\"dash-grid\">\n        <!-- CEO DASHBOARD -->\n        <div class=\"dash-card\">\n          <div class=\"dash-hd\">\n            <div class=\"dash-hd-l\">\n              <div class=\"dash-hd-badge\">CEO<\u002Fdiv>\n              <div class=\"dash-hd-title-wrap\">\n                <div class=\"dash-hd-title\">Executive view<\u002Fdiv>\n                <div class=\"dash-hd-sub\">Forex Broker · W47<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"dash-hd-r\"><div class=\"dash-hd-r-dot\"><\u002Fdiv>4h Auto<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dash-sec\">\n            <div class=\"dash-sec-l\"><span>Week summary<\u002Fspan><span class=\"dash-sec-l-side\">vs prev week<\u002Fspan><\u002Fdiv>\n            <div class=\"dash-kpis\">${ceoKpis}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dash-sec\">\n            <div class=\"dash-sec-l\"><span>Channel ROI · by deposits<\u002Fspan><span class=\"dash-sec-l-side\">$ amount<\u002Fspan><\u002Fdiv>\n            <div class=\"dash-roi\">${ceoChannels}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dash-sec\">\n            <div class=\"dash-sec-l\"><span>3 Priority actions · This week<\u002Fspan><span class=\"dash-sec-l-side\">AI-identified<\u002Fspan><\u002Fdiv>\n            <div class=\"dash-actions\">${ceoActions}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dash-forecast\">\n            <div class=\"dash-forecast-l\">${CEO_DASH.forecast.l}<\u002Fdiv>\n            <div class=\"dash-forecast-v\">${CEO_DASH.forecast.v}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- PPC DASHBOARD -->\n        <div class=\"dash-card\">\n          <div class=\"dash-hd\">\n            <div class=\"dash-hd-l\">\n              <div class=\"dash-hd-badge\">PPC<\u002Fdiv>\n              <div class=\"dash-hd-title-wrap\">\n                <div class=\"dash-hd-title\">Marketer execution<\u002Fdiv>\n                <div class=\"dash-hd-sub\">7 tabs · keyword-level<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"dash-hd-r\"><div class=\"dash-hd-r-dot\"><\u002Fdiv>4h Auto<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dash-tabs\">${ppcTabs}<\u002Fdiv>\n\n          <div class=\"dash-sec\">\n            <div class=\"dash-sec-l\"><span>This week · sorted by impact<\u002Fspan><span class=\"dash-sec-l-side\">5 actions<\u002Fspan><\u002Fdiv>\n            <div class=\"dash-checklist\">${ppcChecks}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"dash-sec\">\n            <div class=\"dash-sec-l\"><span>Campaign quality bridge<\u002Fspan><span class=\"dash-sec-l-side\">Q · Tier · LTV<\u002Fspan><\u002Fdiv>\n            <div class=\"dash-bridge\">\n              <div class=\"dash-bridge-hd\">\n                <div>Campaign<\u002Fdiv>\n                <div style=\"text-align:right;\">Quality<\u002Fdiv>\n                <div style=\"text-align:right;\">Tier<\u002Fdiv>\n                <div style=\"text-align:right;\">LTV<\u002Fdiv>\n              <\u002Fdiv>\n              ${ppcBridgeRows}\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"dash-story\"><b>Same data · two lenses · both true<\u002Fb> — CEO sees deposits & ROAS, Marketer sees campaigns & quality. No AM in the loop.<\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction renderICPLoop(){\n  const cx = 170, cy = 170, r = 118;\n  // 5 nodes at 72° intervals starting from top\n  const positions = ICP_NODES.map((n,i)=>{\n    const theta = (i*72) * Math.PI / 180;\n    const x = cx + r * Math.sin(theta);\n    const y = cy - r * Math.cos(theta);\n    return {x, y, n, i};\n  });\n\n  // Build path connecting consecutive nodes (closed loop)\n  const linePath = positions.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') + ' Z';\n\n  // Build node HTML\n  const nodesHtml = positions.map(p=>`\n    <div class=\"icp-node\" style=\"left:${(p.x/340*100).toFixed(1)}%;top:${(p.y/340*100).toFixed(1)}%;\">\n      <div class=\"icp-node-num\">${p.n.num}<\u002Fdiv>\n      <div class=\"icp-node-name\">${p.n.name}<\u002Fdiv>\n      <div class=\"icp-node-sub\">${p.n.sub}<\u002Fdiv>\n      <div class=\"tip cyan\" style=\"left:50%;top:calc(100% + 8px);bottom:auto;\">${p.n.tip}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  return `\n    <div class=\"icp-frame\">\n      <div class=\"icp-layout\">\n        <div class=\"icp-stage\">\n          <svg viewBox=\"0 0 340 340\" class=\"icp-svg\">\n            <path d=\"${linePath}\" class=\"icp-loop-line\" style=\"animation:icpFlow 1.5s linear infinite;\"/>\n          <\u002Fsvg>\n          <div class=\"icp-center\">\n            <div class=\"icp-center-icon\">◯<\u002Fdiv>\n            <div class=\"icp-center-title\">ICP Model<\u002Fdiv>\n            <div class=\"icp-center-sub\">Week 8 · Refined<\u002Fdiv>\n          <\u002Fdiv>\n          ${nodesHtml}\n        <\u002Fdiv>\n        <div class=\"icp-evo\">\n          <div class=\"icp-evo-title\">ICP Evolution · Generic → Data-backed<\u002Fdiv>\n\n          <div class=\"icp-evo-card old\">\n            <div class=\"icp-evo-card-hd\">\n              <div class=\"icp-evo-card-l\">\n                <span class=\"icp-evo-week\">${ICP_EVO.old.week}<\u002Fspan>\n                <span class=\"icp-evo-label\">${ICP_EVO.old.label}<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"icp-evo-card-r\">Generic targeting · No data input<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"icp-evo-profile\">\n              ${ICP_EVO.old.chips.map(c=>`<span class=\"icp-evo-chip\">${c}<\u002Fspan>`).join('')}\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"text-align:center;font-size:14px;color:#FCD34D;letter-spacing:3px;font-weight:800;\">↓<\u002Fdiv>\n\n          <div class=\"icp-evo-card new\">\n            <div class=\"icp-evo-card-hd\">\n              <div class=\"icp-evo-card-l\">\n                <span class=\"icp-evo-week\">${ICP_EVO.new.week}<\u002Fspan>\n                <span class=\"icp-evo-label\">${ICP_EVO.new.label}<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"icp-evo-card-r\"><span class=\"icp-evo-deposit\">${ICP_EVO.new.deposit}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"icp-evo-profile\">\n              ${ICP_EVO.new.chips.map(c=>`<span class=\"icp-evo-chip\">${c}<\u002Fspan>`).join('')}\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"icp-evo-delta\">${ICP_EVO.delta}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <style>@keyframes icpFlow{to{stroke-dashoffset:-16;}}<\u002Fstyle>\n  `;\n}\n\nfunction renderTruthTable(){\n  const rankClass = (cpl, roas)=>{\n    const delta = cpl - roas; // positive = improves under ROAS (good); negative = drops under ROAS (bad)\n    if(delta >= 3) return 'good';\n    if(delta <= -3) return 'bad';\n    if(delta > 0) return 'flat';\n    if(delta < 0) return 'flat';\n    return 'flat';\n  };\n\n  const rows = TRUTH_ROWS.map(r=>{\n    const cls = rankClass(r.cplR, r.roasR);\n    const arrow = r.roasR < r.cplR ? '↑' : (r.roasR > r.cplR ? '↓' : '·');\n    return `\n      <div class=\"truth-cell name ${cls}\">${r.name}<\u002Fdiv>\n      <div class=\"truth-cell metric\">${r.cpl}<\u002Fdiv>\n      <div class=\"truth-cell metric\">${r.ftd}<\u002Fdiv>\n      <div class=\"truth-cell metric\">${r.dep}<\u002Fdiv>\n      <div class=\"truth-cell metric ${cls}\">${r.roas}<\u002Fdiv>\n      <div class=\"truth-cell rank ${cls}\">${r.cplR}<\u002Fdiv>\n      <div class=\"truth-cell rank ${cls}\">${r.roasR}<span class=\"flip-arrow\">${arrow}<\u002Fspan><\u002Fdiv>\n    `;\n  }).join('');\n\n  return `\n    <div class=\"truth-frame\">\n      <div class=\"truth-table\">\n        <div class=\"truth-hd\">Channel<\u002Fdiv>\n        <div class=\"truth-hd\">CPL<\u002Fdiv>\n        <div class=\"truth-hd\">FTD %<\u002Fdiv>\n        <div class=\"truth-hd\">Avg Dep<\u002Fdiv>\n        <div class=\"truth-hd\">ROAS<\u002Fdiv>\n        <div class=\"truth-hd\">Rank by CPL<\u002Fdiv>\n        <div class=\"truth-hd\">Rank by ROAS<\u002Fdiv>\n        ${rows}\n      <\u002Fdiv>\n      <div class=\"truth-legend\">\n        <span class=\"l-bad\">●<\u002Fspan> <b>\"Trap channels\"<\u002Fb> — cheap CPL, low ROAS · scaling under CPL view = wasted budget &nbsp; · &nbsp;\n        <span class=\"l-good\">●<\u002Fspan> <b>\"Hidden gems\"<\u002Fb> — expensive CPL, high ROAS · would be starved under CPL view, but produce real revenue\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction persistTweak(key, val){\n  TWEAKS[key] = val;\n  S1_TWEAKS[key] = val;\n  try{ window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:val}}, '*'); }catch(e){}\n}\n\nfunction buildTweaksPanel(){\n  if(document.getElementById('tweaks-panel')) return;\n  const panel = document.createElement('div');\n  panel.className = 'tweaks-panel';\n  panel.id = 'tweaks-panel';\n  document.body.appendChild(panel);\n}\n\nfunction rebuildTweaksPanel(layerId){\n  buildTweaksPanel();\n  const panel = document.getElementById('tweaks-panel');\n  if(!panel) return;\n  const isOpen = panel.classList.contains('open');\n\n  let viewSection = '';\n  if(layerId==='s1'){\n    viewSection = `\n      <div class=\"tp-section\">\n        <div class=\"tp-label\">S1 — Architecture view<\u002Fdiv>\n        <div class=\"tp-radio\">\n          <button class=\"tp-radio-btn ${TWEAKS.archView==='pipeline'?'active':''}\" data-view=\"pipeline\" onclick=\"setArchView('pipeline')\">Pipeline<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.archView==='hub'?'active':''}\" data-view=\"hub\" onclick=\"setArchView('hub')\">Hub<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.archView==='stack'?'active':''}\" data-view=\"stack\" onclick=\"setArchView('stack')\">Stack<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  } else if(layerId==='s2'){\n    viewSection = `\n      <div class=\"tp-section\">\n        <div class=\"tp-label\">S2 — Execution view<\u002Fdiv>\n        <div class=\"tp-radio\">\n          <button class=\"tp-radio-btn ${TWEAKS.s2View==='funnel'?'active':''}\" data-s2view=\"funnel\" onclick=\"setS2View('funnel')\">Funnel<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.s2View==='matrix'?'active':''}\" data-s2view=\"matrix\" onclick=\"setS2View('matrix')\">Matrix<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.s2View==='cards'?'active':''}\" data-s2view=\"cards\" onclick=\"setS2View('cards')\">Cards<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  } else if(layerId==='s3'){\n    viewSection = `\n      <div class=\"tp-section\">\n        <div class=\"tp-label\">S3 — Revenue ops view<\u002Fdiv>\n        <div class=\"tp-radio\">\n          <button class=\"tp-radio-btn ${TWEAKS.s3View==='timeline'?'active':''}\" data-s3view=\"timeline\" onclick=\"setS3View('timeline')\">Timeline<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.s3View==='tier'?'active':''}\" data-s3view=\"tier\" onclick=\"setS3View('tier')\">Tier<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.s3View==='scoring'?'active':''}\" data-s3view=\"scoring\" onclick=\"setS3View('scoring')\">Scoring<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  } else if(layerId==='s4'){\n    viewSection = `\n      <div class=\"tp-section\">\n        <div class=\"tp-label\">S4 — Intelligence view<\u002Fdiv>\n        <div class=\"tp-radio\">\n          <button class=\"tp-radio-btn ${TWEAKS.s4View==='clock'?'active':''}\" data-s4view=\"clock\" onclick=\"setS4View('clock')\">Clock<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.s4View==='alerts'?'active':''}\" data-s4view=\"alerts\" onclick=\"setS4View('alerts')\">Alerts<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.s4View==='digest'?'active':''}\" data-s4view=\"digest\" onclick=\"setS4View('digest')\">Digest<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  } else if(layerId==='s5'){\n    viewSection = `\n      <div class=\"tp-section\">\n        <div class=\"tp-label\">S5 — Intelligence view<\u002Fdiv>\n        <div class=\"tp-radio\">\n          <button class=\"tp-radio-btn ${TWEAKS.s5View==='dashboard'?'active':''}\" data-s5view=\"dashboard\" onclick=\"setS5View('dashboard')\">Dashboard<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.s5View==='icp'?'active':''}\" data-s5view=\"icp\" onclick=\"setS5View('icp')\">ICP Loop<\u002Fbutton>\n          <button class=\"tp-radio-btn ${TWEAKS.s5View==='truth'?'active':''}\" data-s5view=\"truth\" onclick=\"setS5View('truth')\">Truth Table<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  }\n\n  panel.innerHTML = `\n    <div class=\"tp-head\">\n      <div class=\"tp-title\">⚙ Tweaks · ${layerId.toUpperCase()}<\u002Fdiv>\n      <button class=\"tp-close\" onclick=\"closeTweaks()\">×<\u002Fbutton>\n    <\u002Fdiv>\n    ${viewSection}\n    <div class=\"tp-section\">\n      <div class=\"tp-label\">Display options<\u002Fdiv>\n      <div class=\"tp-toggle ${TWEAKS.showAnimations?'on':''}\" data-tg=\"showAnimations\" onclick=\"toggleTweak('showAnimations')\">\n        <span class=\"tp-toggle-label\">Show animations<\u002Fspan>\n        <span class=\"tp-toggle-sw\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"tp-toggle ${TWEAKS.showTooltips?'on':''}\" data-tg=\"showTooltips\" onclick=\"toggleTweak('showTooltips')\">\n        <span class=\"tp-toggle-label\">Show hover tooltips<\u002Fspan>\n        <span class=\"tp-toggle-sw\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  if(isOpen) panel.classList.add('open');\n}\n\nfunction toggleTweak(key){\n  TWEAKS[key] = !TWEAKS[key];\n  persistTweak(key, TWEAKS[key]);\n  const tg = document.querySelector(`.tp-toggle[data-tg=\"${key}\"]`);\n  if(tg) tg.classList.toggle('on', TWEAKS[key]);\n  // Apply to S1 container\n  const c = document.querySelector('.s1v');\n  if(c){\n    c.classList.toggle('no-anim', !TWEAKS.showAnimations);\n    c.classList.toggle('no-tips', !TWEAKS.showTooltips);\n  }\n}\n\nfunction openTweaks(){ const p=document.getElementById('tweaks-panel'); if(p) p.classList.add('open'); }\nfunction closeTweaks(){\n  const p=document.getElementById('tweaks-panel');\n  if(p) p.classList.remove('open');\n  try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); }catch(e){}\n}\n\n// Edit-mode protocol\nwindow.addEventListener('message', (e)=>{\n  if(!e.data || typeof e.data!=='object') return;\n  if(e.data.type==='__activate_edit_mode') openTweaks();\n  if(e.data.type==='__deactivate_edit_mode') closeTweaks();\n});\n\nbuildTweaksPanel();\ntry{ window.parent.postMessage({type:'__edit_mode_available'}, '*'); }catch(e){}\n\nsel('s1');\n\nfunction render(id){\n  const L=LAYERS[id];\n  const c=C[id], bg=BG[id], brd=BRD[id];\n\n  const opH=L.outcomes.map(o=>`\n    <div class=\"op\" style=\"background:${bg};border-color:${brd}40;flex:1;min-width:90px;\">\n      <div class=\"op-val\" style=\"color:${o.c};\">${o.v}<\u002Fdiv>\n      <div class=\"op-key\">${o.k}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n\n  const fixH=L.fix.map(f=>`\n    <div class=\"fix-item\" style=\"border-left-color:${brd};\">\n      <div class=\"fix-icon\">${f.i}<\u002Fdiv>\n      <div class=\"fix-text\">${f.t}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n\n  document.getElementById('det-inner').innerHTML=`\n    <!-- HEADER -->\n    <div class=\"det-header\">\n      <div class=\"det-num-big\" style=\"color:${c};\">${L.num}<\u002Fdiv>\n      <div class=\"det-right\">\n        <div class=\"det-kicker\" style=\"color:${c};\">${L.kicker}<\u002Fdiv>\n        <div class=\"det-title\">${L.name}<\u002Fdiv>\n        <div class=\"det-headline\" style=\"color:${c};\">${L.headline}<\u002Fdiv>\n        <div class=\"outcome-pills\">${opH}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- PROBLEM -->\n    <div class=\"cs\">\n      <div class=\"cs-label\">\n        <div class=\"cs-label-bar\" style=\"background:#DC2626;\"><\u002Fdiv>\n        <span style=\"color:#DC2626;\">Vấn đề thực tế<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cs-body\">${L.problem}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- QUOTE -->\n    <div class=\"quote-block\" style=\"border-left-color:${brd};background:${bg};color:${c};\">\n      Fx1 không fix từng symptom — Fx1 fix từ gốc. ${L.name} được thiết kế để giải quyết vấn đề này một lần và không cần quay lại.\n    <\u002Fdiv>\n\n    <!-- FIX -->\n    <div class=\"cs\">\n      <div class=\"cs-label\">\n        <div class=\"cs-label-bar\" style=\"background:${brd};\"><\u002Fdiv>\n        <span style=\"color:${c};\">Fx1 làm gì<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"fix-grid\">${fixH}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- OUTCOME -->\n    <div class=\"cs\">\n      <div class=\"cs-label\">\n        <div class=\"cs-label-bar\" style=\"background:#4ADE80;\"><\u002Fdiv>\n        <span style=\"color:#4ADE80;\">Outcome<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"outcome-card\" style=\"background:${bg};border-left-color:#4ADE80;\">\n        <div class=\"oc-body\" style=\"color:#CBD5E1;\">${L.outcome}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n\n  document.getElementById('intro-screen').style.display='none';\n  document.getElementById('det-content').style.display='block';\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
