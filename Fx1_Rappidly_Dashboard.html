function pdot(color,size=8){
  return `<div class="pdot" style="width:${size}px;height:${size}px;background:${color};--pc:${color};"></div>`;
}
function badge(txt,bg,color,extra=''){
  return `<span style="display:inline-block;background:${bg};color:${color};border-radius:20px;padding:2px 10px;font-size:10px;font-weight:800;${extra}">${txt}</span>`;
}
function kpi(label,val,delta,color,icon){
  return `<div style="background:${C.card};border-radius:12px;padding:16px;border:1px solid ${C.border};border-top:3px solid ${color};position:relative;overflow:hidden;">
    <div style="font-size:10px;font-weight:700;color:${C.dim};letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">${label}</div>
    <div style="font-size:30px;font-weight:800;color:${C.white};line-height:1;">${val}</div>
    <div style="font-size:11px;color:${color};font-weight:600;margin-top:8px;">${delta}</div>
    <div style="position:absolute;top:12px;right:14px;font-size:22px;opacity:0.12;">${icon}</div>
  </div>`;
}
function confCircle(conf,color,size=44,r=17,sw=5){
  const circ=2*Math.PI*r;
  return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${C.border}" stroke-width="${sw}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${circ*conf/100} ${circ}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/><text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="${color}" font-size="${sw===5?11:9}" font-weight="800">${conf}%</text></svg>`;
}

/* ════════════════════════════════════════════════════════════

════════════════════════════════════════════════════════════ */
function initCharts(){
  Chart.defaults.color=C.dim;
  Chart.defaults.font.family="'DM Sans', system-ui, sans-serif";

  if(state.tab==='perf'){
    const bidCtx=document.getElementById('bidChart');
    if(bidCtx){
      charts.bid=new Chart(bidCtx,{
        type:'line',
        data:{
          labels:BID_HISTORY.map(d=>d.t),
          datasets:[
            {label:'Brand KW Bid',data:BID_HISTORY.map(d=>d.brand),borderColor:C.green,borderWidth:2,pointRadius:0,tension:.4},
            {label:'Competitor KW Bid',data:BID_HISTORY.map(d=>d.comp),borderColor:C.gold,borderWidth:2,pointRadius:0,tension:.4},
            {label:'Generic Terms Bid',data:BID_HISTORY.map(d=>d.gen),borderColor:C.red,borderWidth:2,pointRadius:0,tension:.4,borderDash:[5,5]},
            {label:'Retargeting Bid',data:BID_HISTORY.map(d=>d.retarg),borderColor:C.teal,borderWidth:2,pointRadius:0,tension:.4},
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{backgroundColor:C.card,borderColor:C.border,borderWidth:1,callbacks:{label:ctx=>`${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}`}}},
          scales:{
            x:{grid:{color:C.border+'40'},ticks:{font:{size:9}}},
            y:{grid:{color:C.border+'40'},ticks:{callback:v=>`$${v.toFixed(2)}`,font:{size:9}}}
          }
        }
      });
    }
  }

  if(state.tab==='oracle'){
    const wCtx=document.getElementById('weeklyChart');
    if(wCtx){
      charts.weekly=new Chart(wCtx,{
        type:'line',
        data:{
          labels:WEEKLY.map(d=>d.wk),
          datasets:[
            {label:'ROAS',data:WEEKLY.map(d=>d.roas),borderColor:C.teal,borderWidth:2,pointBackgroundColor:C.teal,pointRadius:4,tension:.4,yAxisID:'y'},
            {label:'CPA',data:WEEKLY.map(d=>d.cpa),borderColor:C.green,borderWidth:3,pointBackgroundColor:C.green,pointRadius:5,tension:.4,yAxisID:'y2'},
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{backgroundColor:C.card,borderColor:C.border,borderWidth:1,callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.dataset.label==='ROAS'?ctx.parsed.y+'×':'$'+ctx.parsed.y}`}}},

            x:{grid:{color:C.border+'40'},ticks:{font:{size:11}}},
            y:{type:'linear',position:'left',grid:{color:C.border+'40'},ticks:{callback:v=>`${v}×`,font:{size:10}}},
            y2:{type:'linear',position:'right',grid:{drawOnChartArea:false},ticks:{callback:v=>`$${v}`,font:{size:10}}}
          }
        }
      });
    }
  }
}
